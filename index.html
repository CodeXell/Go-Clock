<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>BadukClock</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--bg2:#141414;--fg:#f5f0e8;--acc:#c8a96e;--red:#e05a4e;--grn:#3a9e6a;
  --bdr:rgba(245,240,232,.08);--bdr2:rgba(245,240,232,.15);
  --r:22px;--bh:56px;--ease:cubic-bezier(.34,1.56,.64,1);--ease-out:cubic-bezier(.22,1,.36,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
html,body{height:100%;height:100dvh;overflow:hidden;font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--fg);user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

.page{position:fixed;inset:0;display:flex;flex-direction:column;transition:opacity .28s ease,transform .28s ease}
.page.hidden{opacity:0;pointer-events:none;transform:translateY(14px)}

/* ── CLOCK PAGE ─────────────────────────────── */
#cp{flex-direction:column}
#cp.fs .cbar{opacity:0;pointer-events:none;height:0;border:none;min-height:0;overflow:hidden}
#cp.fs .half.top{border-radius:0}
#cp.fs .half.bot{border-radius:0}

/* ── HALVES ──────────────────────────────────── */
.half{
  flex:1;position:relative;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;outline:none;
  padding:clamp(14px,4vw,28px);
  transition:background .4s var(--ease-out),filter .4s var(--ease-out),box-shadow .5s var(--ease-out),opacity .4s var(--ease-out);
  will-change:transform,box-shadow,filter;overflow:visible;
}
.half.top{border-radius:0 0 var(--r) var(--r);transform-origin:center top}
.half.bot{border-radius:var(--r) var(--r) 0 0;transform-origin:center bottom}

/* off */
.half.off{background:var(--bg);color:var(--fg);filter:brightness(.36) saturate(.5);opacity:.82;box-shadow:none;transform:none!important;
  transition:background .4s var(--ease-out),filter .4s var(--ease-out),opacity .4s var(--ease-out)}

/* active */
.half.act{background:var(--fg);color:var(--bg);filter:brightness(1) saturate(1);opacity:1}
.half.act.bot{animation:float-bot 4.8s ease-in-out infinite}
.half.act.top{animation:float-top 4.8s ease-in-out infinite}
.half.act.paused{animation-play-state:paused;filter:brightness(.78) saturate(.7)}

@keyframes float-bot{
  0%,100%{transform:translateY(-8px);box-shadow:0 -18px 55px rgba(245,240,232,.18),0 -5px 18px rgba(245,240,232,.11)}
  50%{transform:translateY(-16px);box-shadow:0 -30px 80px rgba(245,240,232,.26),0 -8px 28px rgba(245,240,232,.16)}
}
@keyframes float-top{
  0%,100%{transform:translateY(8px);box-shadow:0 18px 55px rgba(245,240,232,.18),0 5px 18px rgba(245,240,232,.11)}
  50%{transform:translateY(16px);box-shadow:0 30px 80px rgba(245,240,232,.26),0 8px 28px rgba(245,240,232,.16)}
}

/* idle */
.half.idle{background:var(--bg);filter:brightness(.5) saturate(.45);transform:none!important;box-shadow:none!important;animation:none!important}

/* danger */
.half.dp::after{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:2;animation:dpulse .5s ease-in-out infinite}
@keyframes dpulse{0%,100%{box-shadow:inset 0 0 0 0 transparent}50%{box-shadow:inset 0 0 140px 50px rgba(160,0,0,.55)}}
.half.dp .td,.half.dp .ms{color:var(--red)!important}

/* inner wrapper */
.half.top .inn{transform:rotate(180deg);display:flex;flex-direction:column;align-items:center;gap:clamp(8px,1.8vh,12px)}
.half.bot .inn{display:flex;flex-direction:column;align-items:center;gap:clamp(8px,1.8vh,12px)}

/* SBS */
#cp.sbs{flex-direction:row}
#cp.sbs .half.top{border-radius:0 var(--r) var(--r) 0;transform-origin:center left}
#cp.sbs .half.bot{border-radius:var(--r) 0 0 var(--r);transform-origin:center right}
#cp.sbs .half.top .inn{transform:none!important}
#cp.sbs .half.act.top{animation:float-sbs-l 4.8s ease-in-out infinite}
#cp.sbs .half.act.bot{animation:float-sbs-r 4.8s ease-in-out infinite}
@keyframes float-sbs-l{0%,100%{transform:translateX(-8px);box-shadow:18px 0 55px rgba(245,240,232,.18)}50%{transform:translateX(-16px);box-shadow:30px 0 80px rgba(245,240,232,.26)}}
@keyframes float-sbs-r{0%,100%{transform:translateX(8px);box-shadow:-18px 0 55px rgba(245,240,232,.18)}50%{transform:translateX(16px);box-shadow:-30px 0 80px rgba(245,240,232,.26)}}
#cp.sbs .cbar{flex-direction:column;width:var(--bh);height:100%;border:none;border-left:1px solid var(--bdr);border-right:1px solid var(--bdr);padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);gap:8px}
#cp.sbs .cbar-centre{flex-direction:column}
#cp.sbs .sibtn{position:static;margin-top:auto}
#cp.sbs .mvctr{writing-mode:vertical-rl;height:auto;padding:14px 0;width:32px}

/* content */
.plbl{font-size:clamp(9px,1.8vw,11px);font-weight:600;letter-spacing:.32em;text-transform:uppercase;opacity:.42}
.trow{display:flex;align-items:baseline;gap:4px;line-height:1}
.td{font-family:'DM Mono',monospace;font-size:clamp(46px,15vmin,100px);font-weight:300;letter-spacing:-.03em;transition:color .2s,transform .15s}
.ms{font-family:'DM Mono',monospace;font-size:clamp(19px,6vmin,42px);font-weight:300;letter-spacing:-.02em;opacity:.68;min-width:2ch;transition:color .2s,opacity .15s}
.td.pulse{animation:tdp .08s ease}
@keyframes tdp{50%{transform:scale(.96)}}

.sinfo{font-family:'DM Mono',monospace;font-size:clamp(11px,2.4vw,13px);letter-spacing:.05em;opacity:.46;display:flex;align-items:center;gap:8px;min-height:17px;flex-wrap:wrap;justify-content:center}
.bdot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.32;flex-shrink:0;transition:opacity .2s,transform .2s}
.bdot.used{opacity:.1}.bdot.cur{opacity:1;transform:scale(1.5);animation:bdp .9s ease-in-out infinite}
@keyframes bdp{0%,100%{transform:scale(1.5)}50%{transform:scale(1)}}
.bprog{height:2px;background:rgba(128,128,128,.18);width:min(78%,190px);border-radius:2px;overflow:hidden}
.half.act .bprog{background:rgba(0,0,0,.12)}
.bfill{height:100%;background:currentColor;border-radius:2px}

.tapbox{display:flex;align-items:center;gap:8px;pointer-events:none;flex-wrap:wrap;justify-content:center}
.tapb{background:rgba(128,128,128,.12);border:1px solid rgba(128,128,128,.22);border-radius:100px;padding:7px 16px;font-size:clamp(9px,2vw,11px);font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--fg);animation:tapf 2s ease-in-out infinite}
.tapb.s2{font-size:clamp(8px,1.8vw,10px);animation-delay:.45s;opacity:.8}
@keyframes tapf{0%,100%{opacity:.26;transform:translateY(2px)}50%{opacity:.8;transform:translateY(0)}}
.rip{position:absolute;border-radius:50%;background:currentColor;opacity:.12;transform:scale(0);animation:ripA .65s ease-out forwards;pointer-events:none;z-index:5}
@keyframes ripA{to{transform:scale(6);opacity:0}}

/* ── CONTROLS BAR ───────────────────────────── */
.cbar{height:var(--bh);background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;
  gap:clamp(6px,2.5vw,12px);z-index:20;position:relative;
  border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr);
  padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);
  transition:opacity .3s,height .3s}
.cbar-centre{display:flex;align-items:center;justify-content:center;gap:clamp(6px,2.5vw,10px)}
.sibtn{position:absolute;right:max(14px,env(safe-area-inset-right,14px));background:transparent;border:1px solid var(--bdr2);color:var(--fg);width:38px;height:38px;border-radius:50%;cursor:pointer;opacity:.46;display:flex;align-items:center;justify-content:center;transition:all .18s;font-size:15px;-webkit-appearance:none;appearance:none}
.sibtn:active{opacity:1;background:var(--bdr)}
@media(hover:hover){.sibtn:hover{opacity:1;background:var(--bdr)}}
.cb{background:transparent;border:1px solid var(--bdr2);color:var(--fg);font-family:'DM Sans',sans-serif;font-size:clamp(10px,2.2vw,12px);font-weight:500;letter-spacing:.1em;text-transform:uppercase;height:38px;padding:0 clamp(10px,3vw,18px);border-radius:100px;cursor:pointer;transition:all .18s;white-space:nowrap;-webkit-appearance:none;appearance:none;opacity:.6;display:flex;align-items:center}
.cb:active{transform:scale(.93);opacity:1;background:var(--bdr)}
@media(hover:hover){.cb:hover{opacity:1;background:var(--bdr);border-color:var(--fg)}}
.cb.dr{color:var(--red);border-color:rgba(224,90,78,.4);opacity:.56}
.cb.dr:active{background:rgba(224,90,78,.1);opacity:1}
.cb.ac{color:var(--acc);border-color:rgba(200,169,110,.38);opacity:.62}
.cb.ac:active{background:rgba(200,169,110,.1);opacity:1}
.mvctr{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;line-height:1;color:var(--fg);opacity:.7;background:var(--bdr);border:1px solid var(--bdr2);border-radius:100px;height:30px;padding:0 12px;display:inline-flex;align-items:center;justify-content:center;gap:4px;flex-shrink:0}
.mvctr .mv-lbl{opacity:.5;font-size:10px}.mvctr .mv-num{font-weight:500;font-size:12px}
.wl-dot{position:absolute;left:max(10px,env(safe-area-inset-left,10px));bottom:7px;width:5px;height:5px;border-radius:50%;background:var(--acc);opacity:0;transition:opacity .6s}
.wl-dot.alive{opacity:.4;animation:wlp 3s ease-in-out infinite}
@keyframes wlp{0%,100%{opacity:.3}50%{opacity:.6}}

@media(max-height:480px) and (orientation:landscape){
  :root{--bh:48px}
  .td{font-size:clamp(28px,10vmin,52px)}.ms{font-size:clamp(12px,4.5vmin,24px)}
  .sinfo{font-size:10px}.plbl{font-size:9px}.tapb{padding:5px 10px;font-size:9px}
  .mvctr{display:none}
}

/* ── END SCREEN ─────────────────────────────── */
/* Replace the old single expov with split halves */
#endScreen{
  position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity .45s ease;
}
#endScreen.on{opacity:1;pointer-events:all}

.end-half{
  flex:1;position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  transition:background .5s ease;
}
.end-top{background:#1a3a28}   /* winner (black) — green dark */
.end-bot{background:#3a1212}   /* loser (white) — red dark */
/* when white wins, flip */
.end-top.loser{background:#3a1212}
.end-bot.winner{background:#1a3a28}

/* divider line with Play Again button */
.end-divider{
  position:relative;height:1px;background:rgba(255,255,255,.14);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;z-index:10;
}
.end-divider::before,.end-divider::after{
  content:'';position:absolute;left:0;right:0;top:0;height:1px;background:rgba(255,255,255,.1);
}
.play-again-btn{
  position:relative;background:var(--bg);color:var(--fg);border:1px solid rgba(255,255,255,.22);
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  padding:12px 32px;border-radius:100px;cursor:pointer;white-space:nowrap;
  transition:all .18s;-webkit-appearance:none;appearance:none;
  box-shadow:0 2px 24px rgba(0,0,0,.5);
}
.play-again-btn:active{transform:scale(.96);filter:brightness(.85)}
@media(hover:hover){.play-again-btn:hover{background:var(--fg);color:var(--bg)}}

/* winner content */
.end-label{font-size:clamp(9px,2vw,11px);font-weight:700;letter-spacing:.32em;text-transform:uppercase;opacity:.5}
.end-title{font-family:'Playfair Display',serif;font-size:clamp(36px,12vw,80px);font-weight:900;letter-spacing:-.02em;text-align:center;line-height:1}
.end-sub{font-size:clamp(12px,3vw,14px);opacity:.55;text-align:center;letter-spacing:.06em}
.end-half.winner .end-title{color:#7fffb2}
.end-half.loser  .end-title{color:#ff8888}

/* confetti canvas */
#confettiCanvas{position:absolute;inset:0;pointer-events:none;z-index:5}

/* ── RAIN ANIMATION ──────────────────────────── */
.rain-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:3}
.raindrop{position:absolute;top:-40px;width:1.5px;border-radius:2px;background:linear-gradient(to bottom,rgba(130,170,220,0),rgba(130,170,220,.7));animation:fall linear infinite}
@keyframes fall{to{transform:translateY(110vh)}}
.cloud{position:absolute;top:16%;opacity:.22;animation:cloudDrift 18s ease-in-out infinite alternate}
@keyframes cloudDrift{0%{transform:translateX(-6px)}100%{transform:translateX(6px)}}
.cloud svg{width:clamp(60px,22vw,120px);fill:#c0d8f0}

/* ── TOAST ───────────────────────────────────── */
.toast{position:fixed;bottom:max(28px,env(safe-area-inset-bottom,28px));left:50%;transform:translateX(-50%) translateY(80px);background:var(--fg);color:var(--bg);font-size:13px;font-weight:500;padding:11px 22px;border-radius:100px;z-index:600;transition:transform .38s var(--ease);white-space:nowrap;max-width:calc(100vw - 40px);text-align:center}
.toast.on{transform:translateX(-50%) translateY(0)}

/* ── SETTINGS PAGE ───────────────────────────── */
#sp{background:var(--bg);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.shdr{padding:max(44px,env(safe-area-inset-top,44px)) 20px 20px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--bg);z-index:10;display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
.stit{font-family:'Playfair Display',serif;font-size:clamp(22px,6vw,36px);font-weight:900;letter-spacing:-.02em}
.ssub{font-size:10px;letter-spacing:.22em;text-transform:uppercase;opacity:.28;margin-top:4px}
.backbtn{background:transparent;border:1px solid var(--bdr2);color:var(--fg);font-size:12px;letter-spacing:.1em;text-transform:uppercase;padding:0 18px;border-radius:100px;cursor:pointer;transition:background .18s;flex-shrink:0;min-height:40px;display:flex;align-items:center;-webkit-appearance:none;appearance:none}
.backbtn:active{background:var(--bdr)}
.sbody{padding:20px 20px max(64px,env(safe-area-inset-bottom,64px));max-width:580px;margin:0 auto}
.sl{font-size:10px;letter-spacing:.26em;text-transform:uppercase;opacity:.3;margin-bottom:10px;margin-top:28px;font-weight:600}
.sl:first-child{margin-top:0}
.laytog{display:flex;gap:8px}
.layopt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;background:var(--bdr);border:1px solid var(--bdr2);border-radius:14px;padding:13px 10px;cursor:pointer;min-height:68px;color:var(--fg);font-size:11px;letter-spacing:.1em;text-transform:uppercase;opacity:.42;transition:all .18s;-webkit-appearance:none;appearance:none}
.layopt:active{opacity:.8}.layopt.sel{background:transparent;border-color:var(--acc);color:var(--acc);opacity:1}
.layico{font-size:18px;line-height:1}
.cswrap{position:relative}
.cstrig{display:flex;align-items:center;justify-content:space-between;background:var(--bdr);border:1px solid var(--bdr2);border-radius:14px;padding:14px 16px;cursor:pointer;gap:12px;min-height:56px;transition:opacity .18s}
.cstrig:active{opacity:.75}.cstrig.open{border-color:var(--acc);border-radius:14px 14px 0 0;border-bottom-color:transparent}
.csl{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
.csv{font-size:clamp(13px,3.5vw,15px);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.csd{font-family:'DM Mono',monospace;font-size:clamp(10px,2.4vw,11px);opacity:.36;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.csar{width:26px;height:26px;border-radius:50%;border:1px solid var(--bdr2);display:flex;align-items:center;justify-content:center;font-size:10px;opacity:.45;flex-shrink:0;transition:transform .3s var(--ease)}
.cstrig.open .csar{transform:rotate(180deg);opacity:.75}
.cspan{position:absolute;left:0;right:0;top:100%;z-index:50;background:var(--bg2);border:1px solid var(--acc);border-top:none;border-radius:0 0 14px 14px;overflow:hidden;max-height:0;opacity:0;pointer-events:none;transition:max-height .36s cubic-bezier(.4,0,.2,1),opacity .22s}
.cspan.open{max-height:460px;opacity:1;pointer-events:all}
.csopt{display:flex;align-items:center;gap:13px;padding:13px 16px;cursor:pointer;border-bottom:1px solid var(--bdr);min-height:56px;transition:background .14s}
.csopt:last-child{border-bottom:none}.csopt:active,.csopt:hover,.csopt.sel{background:var(--bdr)}
.csico{width:36px;height:36px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--bdr);border:1px solid var(--bdr2)}
.csopt.sel .csico{border-color:var(--acc)}.cstxt{flex:1;min-width:0}
.csnm{font-size:clamp(13px,3.4vw,14px);font-weight:500}.csht{font-family:'DM Mono',monospace;font-size:clamp(10px,2.4vw,11px);opacity:.33;margin-top:2px}
.csopt.sel .csnm{color:var(--acc)}.csck{font-size:13px;color:var(--acc);opacity:0;transition:opacity .18s;flex-shrink:0}.csopt.sel .csck{opacity:1}
.trow2{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid var(--bdr)}
.trlhs{flex:1;min-width:0}.trlbl{font-size:clamp(13px,3.4vw,14px);font-weight:400;opacity:.84}
.trsub{font-family:'DM Mono',monospace;font-size:clamp(10px,2.4vw,11px);opacity:.28;margin-top:2px;line-height:1.4}
.tig{display:flex;align-items:center;gap:4px;flex-shrink:0}
.tin,.cin{background:var(--bdr);border:1px solid var(--bdr2);color:var(--fg);font-family:'DM Mono',monospace;font-size:max(16px,1em);font-weight:300;width:52px;min-height:44px;text-align:center;padding:0 4px;border-radius:12px;outline:none;transition:border-color .18s;-moz-appearance:textfield;-webkit-appearance:none;appearance:none}
.tin::-webkit-inner-spin-button,.tin::-webkit-outer-spin-button,.cin::-webkit-inner-spin-button,.cin::-webkit-outer-spin-button{-webkit-appearance:none}
.tin:focus,.cin:focus{border-color:var(--acc)}.tcol{opacity:.24;font-family:'DM Mono',monospace;font-size:17px;flex-shrink:0}
.tunit{margin-left:4px;font-size:11px;opacity:.26;white-space:nowrap;flex-shrink:0}
/* hours input — same as tin but optional (blank = no hours) */
.hin{background:var(--bdr);border:1px solid var(--bdr2);color:var(--fg);font-family:'DM Mono',monospace;font-size:max(16px,1em);font-weight:300;width:52px;min-height:44px;text-align:center;padding:0 4px;border-radius:12px;outline:none;transition:border-color .18s;-moz-appearance:textfield;-webkit-appearance:none;appearance:none}
.hin::-webkit-inner-spin-button,.hin::-webkit-outer-spin-button{-webkit-appearance:none}
.hin:focus{border-color:var(--acc)}
.rulebox{background:var(--bdr);border:1px solid var(--bdr2);border-radius:14px;padding:14px 16px;margin-top:10px}
.rulebox p{font-size:clamp(12px,3vw,13px);line-height:1.78;opacity:.55}
.rulebox strong{color:var(--acc);font-weight:500}
.pgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
@media(min-width:460px){.pgrid{grid-template-columns:repeat(auto-fill,minmax(148px,1fr))}}
.pcard{background:var(--bdr);border:1px solid var(--bdr2);border-radius:14px;padding:12px;cursor:pointer;position:relative;overflow:hidden;min-height:70px;transition:opacity .18s,border-color .18s}
.pcard:active{opacity:.7}.pcard.sel{border-color:var(--acc)}
.pnm{font-size:clamp(12px,3vw,13px);font-weight:500;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:22px}
.psy{font-size:9px;opacity:.34;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.pde{font-family:'DM Mono',monospace;font-size:10px;opacity:.32;line-height:1.5}
.pdel{position:absolute;top:7px;right:7px;background:rgba(224,90,78,.1);border:none;color:var(--red);cursor:pointer;font-size:11px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:all .18s;-webkit-appearance:none;appearance:none}
@media(hover:none){.pdel{opacity:1;pointer-events:auto}}

  _vid:function(){if(this.video)return;var v=document.createElement('video');v.setAttribute('playsinline','');v.setAttribute('muted','');v.setAttribute('loop','');v.style.cssText='position:fixed;width:1px;height:1px;top:-2px;left:-2px;opacity:0;pointer-events:none';v.src=this.MP4;document.body.appendChild(v);this.video=v},
  acquire:async function(){
    if('wakeLock' in navigator){try{this.lock=await navigator.wakeLock.request('screen');var self=this;this.lock.addEventListener('release',function(){self.lock=null;self._dot(false);if(gs&&gs.phase==='running')self.acquire()});this._dot(true);return}catch(e){}}

/* ═══════════════════ 3-D TILT ══════════════════ */
var tilt={x:0,y:0,tx:0,ty:0,raf:null};
var TILT_MAX=6;
function gel(id){return document.getElementById(id)}
function tiltInn(rx,ry){
  var h=gs&&gs.active?gel('h'+gs.active):null;if(!h)return;
  var inn=h.querySelector('.inn');if(!inn)return;
  var isTop=h.classList.contains('top'),sbs=gel('cp').classList.contains('sbs');
  if(isTop&&!sbs)inn.style.transform='perspective(1000px) rotateX('+rx+'deg) rotateY('+ry+'deg) rotate(180deg)';
  else inn.style.transform='perspective(1000px) rotateX('+rx+'deg) rotateY('+ry+'deg)';
}
function clearInnTilt(){
  var sbs=gel('cp').classList.contains('sbs');
  ['h1','h2'].forEach(function(id){var inn=gel(id).querySelector('.inn');if(!inn)return;inn.style.transform=(!sbs&&id==='h1')?'rotate(180deg)':''});
}
function startTilt(){
  if(tilt.raf)return;
  function step(){tilt.x+=(tilt.tx-tilt.x)*0.07;tilt.y+=(tilt.ty-tilt.y)*0.07;tiltInn(tilt.y,-tilt.x);tilt.raf=requestAnimationFrame(step)}
  tilt.raf=requestAnimationFrame(step);
}
function stopTilt(){
  if(tilt.raf){cancelAnimationFrame(tilt.raf);tilt.raf=null}tilt.tx=0;tilt.ty=0;
  (function decay(){tilt.x+=(0-tilt.x)*0.12;tilt.y+=(0-tilt.y)*0.12;tiltInn(tilt.y,-tilt.x);if(Math.abs(tilt.x)>0.04||Math.abs(tilt.y)>0.04)requestAnimationFrame(decay);else clearInnTilt()})();
}
document.addEventListener('pointermove',function(e){
  if(!gs||gs.phase!=='running')return;var h=gs.active?gel('h'+gs.active):null;if(!h)return;
  var r=h.getBoundingClientRect();
  tilt.tx=Math.max(-TILT_MAX,Math.min(TILT_MAX,((e.clientX-(r.left+r.width/2))/(r.width/2))*TILT_MAX));
  tilt.ty=Math.max(-TILT_MAX,Math.min(TILT_MAX,((e.clientY-(r.top+r.height/2))/(r.height/2))*TILT_MAX));
});
window.addEventListener('deviceorientation',function(e){
  if(!gs||gs.phase!=='running'||e.beta==null)return;
  tilt.tx=Math.max(-TILT_MAX,Math.min(TILT_MAX,(e.gamma||0)*0.2));
  tilt.ty=Math.max(-TILT_MAX,Math.min(TILT_MAX,((e.beta||0)-45)*0.2));
},{passive:true});

/* ═══════════════════ FULLSCREEN ════════════════ */
var isFull=false;
function enterFS(){
  isFull=true;gel('cp').classList.add('fs');
  try{document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen()}catch(e){}
}
function exitFS(){
  isFull=false;gel('cp').classList.remove('fs');
  try{document.fullscreenElement&&document.exitFullscreen&&document.exitFullscreen()}catch(e){}
}

/* ═══════════════════ AUDIO ══════════════════════ */
var actx;
function getActx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}

/* Clock tap sound — wood-block thud */
function playPop(){
  try{
    var c=getActx(),n=c.currentTime;
    /* thump: low pitched */
    var b=c.createBuffer(1,c.sampleRate*.07,c.sampleRate),d=b.getChannelData(0);
    for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3)*.9;
    var s=c.createBufferSource(),g=c.createGain();
    s.buffer=b;g.gain.setValueAtTime(.7,n);g.gain.exponentialRampToValueAtTime(.001,n+.07);
    s.connect(g);g.connect(c.destination);s.start(n);
    /* click transient */
    var o=c.createOscillator(),g2=c.createGain();
    o.type='sine';o.frequency.setValueAtTime(900,n);o.frequency.exponentialRampToValueAtTime(200,n+.03);
    g2.gain.setValueAtTime(.35,n);g2.gain.exponentialRampToValueAtTime(.001,n+.03);
    o.connect(g2);g2.connect(c.destination);o.start(n);o.stop(n+.03);
  }catch(e){}
}

/* Vibration — heavy double-tap like a real clock */
function vibrate(){
  if(navigator.vibrate){
    navigator.vibrate([18,22,12]);
  }
}

/* Countdown beep */
function playBeep(urg){
  try{
    var c=getActx(),n=c.currentTime,f=520+urg*500,d=.15-urg*.06;
    var o=c.createOscillator(),g=c.createGain();
    o.type='sine';o.frequency.setValueAtTime(f,n);
    g.gain.setValueAtTime(0,n);g.gain.linearRampToValueAtTime(.28,n+.01);
    g.gain.setValueAtTime(.28,n+d*.5);g.gain.exponentialRampToValueAtTime(.0001,n+d);
    o.connect(g);g.connect(c.destination);o.start(n);o.stop(n+d+.02);
  }catch(e){}
}

/* Final/End tune — resolving 3-note chime */
function playEndTune(win){
  try{
    var c=getActx(),n=c.currentTime;
    /* A melodic descending or ascending phrase depending on win/lose */
    var notes=win?[523.25,659.25,783.99,1046.5]:[523.25,466.16,392.0,349.23];
    notes.forEach(function(freq,i){
      var t=n+i*.28;
      var o=c.createOscillator(),g=c.createGain(),rev=c.createConvolver();
      o.type='sine';
      /* second partial for richness */
      var o2=c.createOscillator(),g2=c.createGain();
      o2.type='triangle';o2.frequency.setValueAtTime(freq*2,t);
      g2.gain.setValueAtTime(.06,t);g2.gain.exponentialRampToValueAtTime(.001,t+.8);
      o2.connect(g);o2.start(t);o2.stop(t+.9);
      o.frequency.setValueAtTime(freq,t);
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.38,t+.02);
      g.gain.setValueAtTime(.32,t+.1);g.gain.exponentialRampToValueAtTime(.001,t+.9);
      o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+1);
    });
  }catch(e){}
}

function setDanger(pid,on){gel('h'+pid).classList.toggle('dp',on)}

/* ═══════════════════ CONFETTI ═══════════════════ */
var confRaf=null;
function startConfetti(canvas){
  if(!canvas)return;
  var ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;
  var pieces=[];
  for(var i=0;i<90;i++){
    pieces.push({
      x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,
      r:Math.random()*5+3,vx:(Math.random()-.5)*1.5,vy:Math.random()*2.5+1.2,
      angle:Math.random()*360,spin:(Math.random()-.5)*6,
      color:['#7fffb2','#ffe066','#82e0ff','#f0a0ff','#ffffff'][Math.floor(Math.random()*5)],
      wave:Math.random()*2*Math.PI
    });
  }
  function frame(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    var still=false;
    pieces.forEach(function(p){
      p.wave+=0.04;p.x+=p.vx+Math.sin(p.wave)*0.4;p.y+=p.vy;p.angle+=p.spin;
      if(p.y<canvas.height+20)still=true;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle*Math.PI/180);
      ctx.fillStyle=p.color;ctx.globalAlpha=0.88;
      ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*2.2);
      ctx.restore();
    });
    if(still)confRaf=requestAnimationFrame(frame);
  }
  if(confRaf)cancelAnimationFrame(confRaf);
  confRaf=requestAnimationFrame(frame);
}
function stopConfetti(){if(confRaf){cancelAnimationFrame(confRaf);confRaf=null}var c=gel('confettiCanvas');if(c){var ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height)}}

/* ═══════════════════ RAIN ═══════════════════════ */
function buildRain(wrap){
  wrap.innerHTML='';
  for(var i=0;i<55;i++){
    var d=document.createElement('div');
    d.className='raindrop';
    var left=Math.random()*105-2;
    var dur=0.55+Math.random()*0.7;
    var h=22+Math.random()*28;
    var delay=Math.random()*2;
    d.style.cssText='left:'+left+'%;height:'+h+'px;animation-duration:'+dur+'s;animation-delay:-'+delay+'s;opacity:'+(0.3+Math.random()*0.5);
    wrap.appendChild(d);
  }
}

/* ═══════════════════ END SCREEN ═════════════════ */
function showEnd(winnerPid){
  var loserPid=winnerPid===1?2:1;
  var wName=winnerPid===1?'Black':'White';
  var lName=loserPid===1?'Black':'White';
  /* Player 1 = top half (endTop), Player 2 = bottom half (endBot) */
  var topIsWinner=(winnerPid===1);
  var eTop=gel('endTop'),eBot=gel('endBot');
  eTop.className='end-half end-top '+(topIsWinner?'winner':'loser');
  eBot.className='end-half end-bot '+(topIsWinner?'loser':'winner');
  gel('endTopLabel').textContent=wName+(topIsWinner?' wins':'');
  gel('endBotLabel').textContent=lName+(topIsWinner?'':' wins');
  if(topIsWinner){
    gel('endTopTitle').textContent='You Win!';gel('endTopSub').textContent='Well played, '+wName+'!';
    gel('endBotTitle').textContent='Time Out';gel('endBotSub').textContent='Better luck next time, '+lName;
  } else {
    gel('endTopTitle').textContent='Time Out';gel('endTopSub').textContent='Better luck next time, '+wName;
    gel('endBotTitle').textContent='You Win!';gel('endBotSub').textContent='Well played, '+lName+'!';
  }
  /* colour the halves */
  eTop.style.background=topIsWinner?'#0f2b1c':'#2b0f0f';
  eBot.style.background=topIsWinner?'#2b0f0f':'#0f2b1c';

  /* confetti on winner half */
  var confCanvas=gel('confettiCanvas');
  var confHalf=topIsWinner?eTop:eBot;
  if(confCanvas.parentElement!==confHalf)confHalf.prepend(confCanvas);
  /* rain on loser half */
  var rainWrap=gel('rainWrap');
  var rainHalf=topIsWinner?eBot:eTop;
  if(rainWrap.parentElement!==rainHalf)rainHalf.prepend(rainWrap);
  buildRain(rainWrap);

  gel('endScreen').classList.add('on');

}

function mkP(){
  var s=cfg,sys=s.system;
  var extra=(s.extraHours||0)*3600*1000;
  if(sys==='japanese') return{main:s.mainTime*1000+extra,byoLeft:s.byoTime*1000,byoCount:s.byoCount,byoTotal:s.byoTime*1000,inByo:(s.mainTime===0&&extra===0)};
  if(sys==='sudden')   return{main:s.mainTime*1000+extra};
  if(sys==='canadian') return{main:s.mainTime*1000+extra,byoLeft:s.byoTime*1000,byoTotal:s.byoTime*1000,movInPer:0,movReq:s.movesPerPeriod,inByo:(s.mainTime===0&&extra===0)};
  if(sys==='fischer')  return{main:s.mainTime*1000+extra,inc:s.increment*1000};

}

/* ═══════════════════ FORMAT TIME ════════════════ */
function fmtTime(ms){
  var neg=ms<0; ms=Math.abs(ms);
  var tot=Math.ceil(ms/1000);
  var h=Math.floor(tot/3600);
  var m=Math.floor((tot%3600)/60);
  var s=tot%60;
  if(h>0) return(neg?'-':'')+h+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  return(neg?'-':'')+(m>0?m+':'+String(s).padStart(2,'0'):String(s));
}
function fmtTenths(ms){return ms>=0?('.'+Math.floor((ms%1000)/100)):''}
function showMs(ms){return ms>=0&&ms<10000}

function updMVC(){
  var el=gel('mvc');
  if(gs.phase==='idle'||gs.phase==='expired'){el.style.display='none';return}
  el.style.display='';gel('mvn').textContent=gs.moves;
}

function updDisplay(pid){
  var p=pid===1?gs.p1:gs.p2,sys=cfg.system;
  var tEl=gel('t'+pid),msEl=gel('ms'+pid),sEl=gel('s'+pid);
  var pEl=gel('pr'+pid),fEl=gel('pf'+pid);
  for(var i=0;i<5;i++)gel('d'+pid+'-'+i).style.display='none';
  pEl.style.display='none';
  var dms=0;
  if(sys==='japanese'){
    if(!p.inByo){
      dms=p.main;tEl.textContent=fmtTime(p.main);
      sEl.textContent='× '+p.byoCount+' byo-yomi';dots(pid,p.byoCount,cfg.byoCount,false);
    } else {
      dms=p.byoLeft;tEl.textContent=fmtTime(p.byoLeft);
      sEl.textContent=p.byoCount>1?(p.byoCount+' periods left'):'Last period!';
      dots(pid,p.byoCount,cfg.byoCount,true);
      pEl.style.display='block';fEl.style.width=Math.max(0,(p.byoLeft/p.byoTotal)*100)+'%';
    }
  } else if(sys==='sudden'){
    dms=p.main;tEl.textContent=fmtTime(p.main);sEl.textContent='Sudden death';
  } else if(sys==='canadian'){
    if(!p.inByo){
      dms=p.main;tEl.textContent=fmtTime(p.main);sEl.textContent=cfg.movesPerPeriod+' moves / period';
    } else {
      dms=p.byoLeft;tEl.textContent=fmtTime(p.byoLeft);
      var mv=p.movReq-p.movInPer;sEl.textContent=mv+' move'+(mv!==1?'s':'')+' left';
      pEl.style.display='block';fEl.style.width=Math.max(0,(p.byoLeft/p.byoTotal)*100)+'%';
    }
  } else if(sys==='fischer'){
    dms=p.main;tEl.textContent=fmtTime(p.main);sEl.textContent='+'+cfg.increment+'s / move';
  } else if(sys==='simple'){
    dms=p.main;tEl.textContent=fmtTime(p.main);sEl.textContent='per move';
    pEl.style.display='block';fEl.style.width=Math.max(0,(p.main/p.movTot)*100)+'%';
  }
  var isAct=(gs.phase==='running'&&gs.active===pid);
  if(isAct&&showMs(dms)){msEl.textContent=fmtTenths(dms);msEl.style.opacity='.68'}
  else{msEl.textContent='';msEl.style.opacity='0'}
}

function dots(pid,rem,tot,inByo){
  var show=Math.min(tot,5);
  for(var i=0;i<5;i++){
    var d=gel('d'+pid+'-'+i);
    if(i>=show){d.style.display='none';continue}
    d.style.display='';d.className='bdot';
    if(rem<=i)d.classList.add('used');
    else if(inByo&&i===rem-1)d.classList.add('cur');
  }
}

function updHalves(){
  var h1=gel('h1'),h2=gel('h2'),th1=gel('th1'),th2=gel('th2');
  h1.className='half top';h2.className='half bot';
  if(gs.phase==='idle'){
    h1.classList.add('idle');h2.classList.add('idle');
    th1.style.display='flex';th2.style.display='flex';
  } else {
    th1.style.display='none';th2.style.display='none';
    var paused=(gs.phase==='paused');
    if(gs.active===1){h1.classList.add('act');if(paused)h1.classList.add('paused');h2.classList.add('off')}
    else if(gs.active===2){h2.classList.add('act');if(paused)h2.classList.add('paused');h1.classList.add('off')}
    else{h1.classList.add('off');h2.classList.add('off')}
  }
  clearInnTilt();
}

/* ═══════════════════ TICK ═══════════════════════ */
function startRAF(){if(rafId)return;lastTick=performance.now();rafId=requestAnimationFrame(rafLoop)}
function stopRAF(){if(rafId){cancelAnimationFrame(rafId);rafId=null}}
function rafLoop(now){if(gs.phase!=='running'){stopRAF();return}tickMs(now-lastTick);lastTick=now;rafId=requestAnimationFrame(rafLoop)}

function byoTh(tot){return tot<=10000?5000:10000}
var lastBeepSec={1:-1,2:-1};
function beepIfNeeded(pid,msLeft,thresh){
  var sec=Math.ceil(msLeft/1000);
  if(sec!==lastBeepSec[pid]){
    lastBeepSec[pid]=sec;playBeep(Math.max(0,Math.min(1,1-(msLeft/thresh))));
    var e=gel('t'+pid);e.classList.remove('pulse');void e.offsetWidth;e.classList.add('pulse');
    setTimeout(function(){e.classList.remove('pulse')},120);
  }
}

function tickMs(dt){
  var pid=gs.active,p=pid===1?gs.p1:gs.p2,sys=cfg.system;
  if(sys==='japanese'){
    if(!p.inByo){
      p.main-=dt;
      if(p.main<=0){p.main=0;p.inByo=true;setDanger(pid,false)}
      else if(p.main<=10000){beepIfNeeded(pid,p.main,10000);setDanger(pid,true)}
      else setDanger(pid,false);
    }
    if(p.inByo){
      p.byoLeft-=dt;
      if(p.byoLeft<=0){p.byoCount-=1;if(p.byoCount<=0){setDanger(pid,false);expire();return}p.byoLeft=p.byoTotal;setDanger(pid,false)}
      else{var th=byoTh(p.byoTotal);if(p.byoLeft<=th){beepIfNeeded(pid,p.byoLeft,th);setDanger(pid,true)}else setDanger(pid,false)}
    }
  } else if(sys==='sudden'){
    p.main-=dt;
    if(p.main<=0){setDanger(pid,false);expire();return}
    if(p.main<=10000){beepIfNeeded(pid,p.main,10000);setDanger(pid,true)}else setDanger(pid,false);
  } else if(sys==='canadian'){
    if(!p.inByo){
      p.main-=dt;
      if(p.main<=0){p.main=0;p.inByo=true;p.byoLeft=p.byoTotal;p.movInPer=0;setDanger(pid,false)}
      else if(p.main<=10000){beepIfNeeded(pid,p.main,10000);setDanger(pid,true)}else setDanger(pid,false);
    } else {
      p.byoLeft-=dt;
      if(p.byoLeft<=0){setDanger(pid,false);expire();return}
      var th2=byoTh(p.byoTotal);if(p.byoLeft<=th2){beepIfNeeded(pid,p.byoLeft,th2);setDanger(pid,true)}else setDanger(pid,false);
    }
  } else if(sys==='fischer'){
    p.main-=dt;
    if(p.main<=0){setDanger(pid,false);expire();return}
    if(p.main<=10000){beepIfNeeded(pid,p.main,10000);setDanger(pid,true)}else setDanger(pid,false);
  } else if(sys==='simple'){
    p.main-=dt;
    if(p.main<=0){setDanger(pid,false);expire();return}
    var th3=byoTh(p.movTot);if(p.main<=th3){beepIfNeeded(pid,p.main,th3);setDanger(pid,true)}else setDanger(pid,false);
  }
  updDisplay(pid);
  gel('ms'+(pid===1?2:1)).textContent='';
}

function expire(){
  stopRAF();WL.release();stopTilt();exitFS();
  gs.phase='expired';updDisplay(gs.active);updHalves();updMVC();
  showEnd(gs.active===1?2:1); /* winner is the OTHER player */
}

/* ═══════════════════ GAME CONTROL ══════════════ */
function switchTurn(fromPid){
  if(gs.phase==='expired')return;
  if(gs.phase==='idle'){
    initP();updDisplay(1);updDisplay(2);setDanger(1,false);setDanger(2,false);lastBeepSec={1:-1,2:-1};
    playPop();vibrate();ripple(fromPid);startP(fromPid===1?2:1);return;
  }
  if(gs.phase==='paused')return;
  if(gs.active!==fromPid)return;
  var p=fromPid===1?gs.p1:gs.p2,sys=cfg.system;
  if(sys==='japanese'&&p.inByo)p.byoLeft=p.byoTotal;
  if(sys==='canadian'&&p.inByo){p.movInPer+=1;if(p.movInPer>=p.movReq){p.movInPer=0;p.byoLeft=p.byoTotal}}
  if(sys==='fischer')p.main+=p.inc;
  if(sys==='simple')p.main=p.movTot;
  gs.moves+=1;setDanger(fromPid,false);lastBeepSec[fromPid]=-1;
  playPop();vibrate();ripple(fromPid);startP(fromPid===1?2:1);updMVC();
}

function startP(pid){
  if(cfg.system==='simple'){var np=pid===1?gs.p1:gs.p2;np.main=np.movTot}
  gs.active=pid;gs.phase='running';lastBeepSec[pid]=-1;
  updHalves();stopRAF();lastTick=performance.now();startRAF();
  WL.acquire();startTilt();enterFS();
}

function togglePause(){
  if(gs.phase==='idle'||gs.phase==='expired')return;
  if(gs.phase==='running'){
    gs.phase='paused';stopRAF();WL.release();stopTilt();exitFS();
    gel('btnP').textContent='Resume';
  } else {
    gs.phase='running';lastTick=performance.now();startRAF();WL.acquire();startTilt();enterFS();
    gel('btnP').textContent='Pause';
  }
  updHalves();
}

function resetGame(){
  stopRAF();WL.release();stopTilt();exitFS();hideEnd();
  gs.phase='idle';gs.active=null;initP();
  gel('btnP').textContent='Pause';setDanger(1,false);setDanger(2,false);lastBeepSec={1:-1,2:-1};
  updDisplay(1);updDisplay(2);updHalves();updTapLbls();updMVC();
}

function ripple(pid){
  var h=gel('h'+pid),r=document.createElement('div');
  r.className='rip';r.style.cssText='width:130px;height:130px;left:50%;top:50%;margin-left:-65px;margin-top:-65px;';
  h.appendChild(r);setTimeout(function(){r.remove()},700);
}

/* ═══════════════════ SETTINGS UI ═══════════════ */
var ddOpen=false,curSys=cfg.system;
function toggleDD(){ddOpen=!ddOpen;gel('cstrig').classList.toggle('open',ddOpen);gel('cspan').classList.toggle('open',ddOpen)}
function closeDD(){ddOpen=false;gel('cstrig').classList.remove('open');gel('cspan').classList.remove('open')}
function buildDD(){

function selSys(id){

  gel('cspan').querySelectorAll('.csopt').forEach(function(o){o.classList.toggle('sel',o.dataset.id===id)});

function buildTF(sysId){
  var sys=SYS[sysId],con=gel('tfields');con.innerHTML='';
  if(!sys.fields.length)return;
  var lbl=document.createElement('div');lbl.className='sl';lbl.textContent='Time Settings';lbl.style.marginTop='26px';con.appendChild(lbl);

      inp='<div class="tig"><input class="cin" type="number" id="fi_'+f.id+'" min="1" max="999" value="'+val+'"><span class="tunit">'+(f.unit||'')+'</span></div>';
    }
    row.innerHTML='<div class="trlhs"><div class="trlbl">'+f.lbl+'</div><div class="trsub">'+f.sub+'</div></div>'+inp;
    con.appendChild(row);

  /* Extra hours row — optional, works for all systems except 'simple' */

      +'<div class="tig"><input class="hin" type="number" id="fi_extraHours" min="0" max="24" placeholder="—" value="'+(hval>0?hval:'')+'" ><span class="tunit">hr</span></div>';
    con.appendChild(hrow);

}
function buildRules(sysId){gel('rtxt').innerHTML=SYS[sysId].rules}
function readTF(){
  var sys=SYS[curSys],out={system:curSys};
  sys.fields.forEach(function(f){
    if(f.t==='mm'){
      var m=parseInt(gel('fi_'+f.id+'_m').value)||0,s=parseInt(gel('fi_'+f.id+'_s').value)||0;
      out[f.id]=m*60+s;
    } else {
      out[f.id]=Math.max(1,parseInt(gel('fi_'+f.id).value)||1);
    }
  });
  /* extra hours */
  var he=gel('fi_extraHours');
  out.extraHours=(he&&he.value.trim()!=='')?Math.max(0,parseInt(he.value)||0):0;
  return Object.assign({},DEFS,out);
}
function loadSUI(){
  curSys=cfg.system;var sys=SYS[curSys];
  gel('csv').textContent=sys.name;gel('csd').textContent=sys.sd;gel('ssub').textContent=sys.name;
  gel('lStk').classList.toggle('sel',curLayout==='stacked');gel('lSbs').classList.toggle('sel',curLayout==='side');
  buildDD();buildTF(curSys);buildRules(curSys);
}
function applyAndPlay(){var s=readTF();saveSettings(s);resetGame();showClock()}
function showSettings(){
  if(gs.phase==='running')togglePause();
  gel('cp').classList.add('hidden');gel('sp').classList.remove('hidden');
  loadSUI();renderPresets();
}

/* ═══════════════════ PRESETS ════════════════════ */
function fmtD(s){if(s<=0)return'0s';if(s>=3600&&s%3600===0)return(s/3600)+'h';if(s>=60&&s%60===0)return Math.floor(s/60)+'m';if(s>=60)return Math.floor(s/60)+'m'+String(s%60)+'s';return s+'s'}
function pLabel(p){
  var extra=p.extraHours>0?(' +'+p.extraHours+'h'):'';
  if(p.system==='japanese') return fmtD(p.mainTime)+extra+' + '+p.byoCount+'×'+fmtD(p.byoTime);
  if(p.system==='sudden')   return fmtD(p.mainTime)+extra+' Sudden';
  if(p.system==='canadian') return fmtD(p.mainTime)+extra+' + '+p.movesPerPeriod+'mv/'+fmtD(p.byoTime);
  if(p.system==='fischer')  return fmtD(p.mainTime)+extra+' +'+p.increment+'s';
  if(p.system==='simple')   return fmtD(p.moveTime)+' / move';
  return '';
}
function savePreset(){
  var s=readTF();
  showModal({title:'Save Preset',sub:'Name this configuration',ph:'e.g. Tournament 30m',def:pLabel(s),ok:'Save',
    cb:function(name){
      var arr=presets.slice();
      arr.push(Object.assign({name:name},s));
      savePresets(arr);
      renderPresets();
      toast('"'+name+'" saved');
    }});
}
function delPreset(i){var arr=presets.slice();arr.splice(i,1);savePresets(arr);renderPresets()}
function loadPreset(i){cfg=Object.assign({},DEFS,presets[i]);saveSettings(cfg);loadSUI();renderPresets();toast('Loaded "'+presets[i].name+'"')}
function renderPresets(){
  var g=gel('pgrid');g.innerHTML='';
  if(!presets.length){g.innerHTML='<div style="grid-column:1/-1;font-size:12px;opacity:.28;padding:6px 0">No presets saved yet.</div>';return}
  presets.forEach(function(p,i){
    var si=SYS[p.system],c=document.createElement('div');
    c.className='pcard'+(p.system===cfg.system&&pLabel(p)===pLabel(cfg)?' sel':'');
    c.innerHTML='<div class="pnm">'+esc(p.name)+'</div><div class="psy">'+(si?si.icon+' '+si.name:p.system)+'</div><div class="pde">'+esc(pLabel(p))+'</div><button class="pdel" aria-label="Delete">✕</button>';
    c.querySelector('.pdel').addEventListener('click',function(e){e.stopPropagation();delPreset(i)});
    c.addEventListener('click',function(){loadPreset(i)});
    g.appendChild(c);
  });
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

/* ═══════════════════ MODAL ══════════════════════ */
var modalCB=null;
function showModal(o){
  modalCB=o.cb||null;gel('mtit').textContent=o.title||'';gel('msub').textContent=o.sub||'';
  var inp=gel('minp');inp.placeholder=o.ph||'';inp.value=o.def||'';inp.style.display=o.noInp?'none':'block';
  gel('mok').textContent=o.ok||'OK';gel('mok').className='mok'+(o.danger?' danger':'');
  gel('mback').classList.add('on');
  if(!o.noInp)setTimeout(function(){inp.focus();inp.select()},260);
}
function closeModal(){gel('mback').classList.remove('on');modalCB=null}
function confirmModal(){
  var inp=gel('minp'),noInp=inp.style.display==='none',val=noInp?'__ok__':inp.value.trim();
  if(!noInp&&!val){inp.focus();return}
  closeModal();if(modalCB)modalCB(val);
}

/* ═══════════════════ TOAST / LABELS ═════════════ */
var toastT;
function toast(msg){var t=gel('toast');t.textContent=msg;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('on')},2500)}
function updTapLbls(){var l=SYS[cfg.system]?SYS[cfg.system].tl:'';gel('tl1').textContent=l;gel('tl2').textContent=l}

/* ═══════════════════ EVENTS ═════════════════════ */
[['h1',1],['h2',2]].forEach(function(pair){
  var el=gel(pair[0]),pid=pair[1],sup=false;
  el.addEventListener('touchstart',function(e){e.preventDefault();switchTurn(pid)},{passive:false});
  el.addEventListener('touchend',function(){sup=true;setTimeout(function(){sup=false},500)},{passive:true});
  el.addEventListener('click',function(e){if(sup){e.stopImmediatePropagation();return}switchTurn(pid)},true);
});
gel('btnR').addEventListener('click',resetGame);
gel('btnP').addEventListener('click',function(){if(isFull)exitFS();togglePause()});
gel('btnS').addEventListener('click',showSettings);
gel('btnBk').addEventListener('click',showClock);
gel('btnPl').addEventListener('click',applyAndPlay);
gel('btnAP').addEventListener('click',savePreset);
gel('btnPA').addEventListener('click',resetGame);
gel('lStk').addEventListener('click',function(){setLayout('stacked')});
gel('lSbs').addEventListener('click',function(){setLayout('side')});
gel('cstrig').addEventListener('click',toggleDD);
document.addEventListener('click',function(e){if(ddOpen&&!gel('cswrap').contains(e.target))closeDD()});
gel('mcan').addEventListener('click',closeModal);
gel('mok').addEventListener('click',confirmModal);
gel('mback').addEventListener('click',function(e){if(e.target===gel('mback'))closeModal()});
gel('minp').addEventListener('keydown',function(e){if(e.key==='Enter')confirmModal();if(e.key==='Escape')closeModal()});
document.addEventListener('touchmove',function(e){if(!gel('sp').classList.contains('hidden'))return;e.preventDefault()},{passive:false});
document.addEventListener('keydown',function(e){
  if(!gel('sp').classList.contains('hidden'))return;
  if(gel('mback').classList.contains('on'))return;
  if(e.code==='Space'||e.code==='Enter'){e.preventDefault();if(gs.active!==null)switchTurn(gs.active);else switchTurn(2)}
  if(e.code==='KeyP'){if(isFull)exitFS();togglePause()}
  if(e.code==='KeyR')resetGame();
  if(e.code==='Escape'){if(isFull)exitFS()}
});

/* ═══════════════════ INIT ═══════════════════════ */
applyLayout(curLayout);
initP();
updDisplay(1);updDisplay(2);
updHalves();updTapLbls();updMVC();
</script>
</body>
</html>
