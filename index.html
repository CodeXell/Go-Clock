<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" id="tcMeta" content="#0a0a0a">
<title>Go Clock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=Noto+Serif+JP:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ╔══════════════════════════════════════════════════════╗
   ║  CSS CUSTOM PROPERTIES — swapped per theme           ║
   ╚══════════════════════════════════════════════════════╝ */
:root {
  /* ── Obsidian (default) ── */
  --bg:        #0a0a0a;
  --bg2:       #141414;
  --fg:        #f5f0e8;
  --fg2:       #a09080;
  --acc:       #c8a96e;
  --acc-glow:  rgba(200,169,110,.18);
  --red:       #e05a4e;
  --border:    rgba(245,240,232,.08);
  --border2:   rgba(245,240,232,.15);
  --half-off:  #0a0a0a;
  --half-on:   #f5f0e8;
  --half-on-c: #0a0a0a;
  --glow:      rgba(245,240,232,.20);
  --tap-c:     #f5f0e8;
  --cbar:      #0a0a0a;
  --font-d:    'DM Mono', monospace;
  --font-ui:   'DM Sans', sans-serif;
  --font-lbl:  'DM Sans', sans-serif;
  --r:         24px;
  --bh:        64px;
  --ease:      cubic-bezier(.34,1.56,.64,1);
}

/* ── Kaya (warm wood / Japanese) ─────────────────────── */
body.t-kaya {
  --bg:        #1e1509;
  --bg2:       #2a1e0d;
  --fg:        #f0e2c0;
  --fg2:       #9a7a50;
  --acc:       #c8863a;
  --acc-glow:  rgba(200,134,58,.2);
  --red:       #b83028;
  --border:    rgba(240,226,192,.09);
  --border2:   rgba(240,226,192,.2);
  --half-off:  #1e1509;
  --half-on:   #e8d4a0;
  --half-on-c: #1a1008;
  --glow:      rgba(200,160,80,.28);
  --tap-c:     #f0e2c0;
  --cbar:      #160f06;
  --font-d:    'Noto Serif JP', serif;
  --font-ui:   'DM Sans', sans-serif;
  --font-lbl:  'Noto Serif JP', serif;
}

/* ── Cypher (techy / terminal) ───────────────────────── */
body.t-cypher {
  --bg:        #000000;
  --bg2:       #080808;
  --fg:        #00e87a;
  --fg2:       #007a40;
  --acc:       #00e87a;
  --acc-glow:  rgba(0,232,122,.15);
  --red:       #ff2244;
  --border:    rgba(0,232,122,.1);
  --border2:   rgba(0,232,122,.22);
  --half-off:  #000000;
  --half-on:   #001508;
  --half-on-c: #00e87a;
  --glow:      rgba(0,232,122,.25);
  --tap-c:     #00e87a;
  --cbar:      #000000;
  --font-d:    'Share Tech Mono', monospace;
  --font-ui:   'Share Tech Mono', monospace;
  --font-lbl:  'Share Tech Mono', monospace;
}

/* ── Aether (ethereal / cosmic) ─────────────────────── */
body.t-aether {
  --bg:        #07051a;
  --bg2:       #0e0a28;
  --fg:        #ddd4ff;
  --fg2:       #7a68cc;
  --acc:       #b48aff;
  --acc-glow:  rgba(180,138,255,.18);
  --red:       #ff5577;
  --border:    rgba(180,138,255,.1);
  --border2:   rgba(180,138,255,.22);
  --half-off:  #07051a;
  --half-on:   #1a1040;
  --half-on-c: #ddd4ff;
  --glow:      rgba(150,100,255,.28);
  --tap-c:     #c8b8ff;
  --cbar:      #050414;
  --font-d:    'DM Mono', monospace;
  --font-ui:   'DM Sans', sans-serif;
  --font-lbl:  'DM Sans', sans-serif;
}

/* ╔══════════════════════════════════════════════════════╗
   ║  RESET & BASE                                        ║
   ╚══════════════════════════════════════════════════════╝ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { -webkit-text-size-adjust:100% }
html, body {
  height:100%; height:100dvh; overflow:hidden;
  font-family:var(--font-ui);
  background:var(--bg); color:var(--fg);
  user-select:none; -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transition:background .55s, color .4s;
}

/* ── pages ─────────────────────────────────────────── */
.page {
  position:fixed; inset:0; display:flex; flex-direction:column;
  transition:opacity .3s ease, transform .3s ease;
}
.page.hidden { opacity:0; pointer-events:none; transform:translateY(18px) }

/* ── side-by-side layout ──────────────────────────── */
#cp { flex-direction:column }
#cp.sbs { flex-direction:row }
#cp.sbs .half.top { border-radius:0 var(--r) var(--r) 0; transform-origin:center left }
#cp.sbs .half.bot { border-radius:var(--r) 0 0 var(--r); transform-origin:center right }
#cp.sbs .half.top .inn { transform:none }
#cp.sbs .half.act.top { transform:translateX(-6px) }
#cp.sbs .half.act.bot { transform:translateX(6px) }
#cp.sbs .cbar {
  flex-direction:column; width:var(--bh); height:100%;
  border:none; border-left:1px solid var(--border); border-right:1px solid var(--border);
  padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom); gap:10px;
}
#cp.sbs .logo   { position:static; writing-mode:vertical-rl; transform:rotate(180deg); margin-bottom:auto }
#cp.sbs .sibtn  { position:static; margin-top:auto }
#cp.sbs .mvctr  { writing-mode:vertical-rl }

/* ── clock halves ─────────────────────────────────── */
.half {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  cursor:pointer; position:relative; outline:none;
  gap:clamp(8px,1.8vh,14px); padding:clamp(14px,4vw,28px);
  transition:background .32s, box-shadow .4s, transform .4s var(--ease), filter .3s;
}
.half.top { transform-origin:center top;   border-radius:0 0 var(--r) var(--r) }
.half.bot { transform-origin:center bottom; border-radius:var(--r) var(--r) 0 0 }
.half.off { background:var(--half-off); color:var(--fg); filter:brightness(.58) }
.half.act { background:var(--half-on); color:var(--half-on-c) }
.half.act.bot { box-shadow:0 -24px 90px var(--glow), 0 -4px 20px var(--glow); transform:translateY(-6px) }
.half.act.top { box-shadow:0  24px 90px var(--glow), 0  4px 20px var(--glow); transform:translateY(6px) }

/* danger pulse */
.half.dp::after {
  content:''; position:absolute; inset:0; border-radius:inherit;
  pointer-events:none; z-index:2; animation:de .52s ease-in-out infinite;
}
@keyframes de {
  0%,100% { box-shadow:inset 0 0 0 0 transparent; background:transparent }
  50%      { box-shadow:inset 0 0 150px 50px rgba(170,0,0,.6); background:rgba(140,0,0,.06) }
}
.half.dp .td, .half.dp .ms { color:var(--red) !important }

/* inner — top half rotates 180° */
.half.top .inn {
  transform:rotate(180deg); display:flex; flex-direction:column;
  align-items:center; gap:clamp(8px,1.8vh,12px);
}
.plbl {
  font-size:clamp(9px,1.8vw,11px); font-weight:600;
  letter-spacing:.32em; text-transform:uppercase; opacity:.42;
  font-family:var(--font-lbl);
}

/* time display */
.trow { display:flex; align-items:baseline; gap:4px; line-height:1 }
.td {
  font-family:var(--font-d); font-size:clamp(50px,17vmin,106px);
  font-weight:300; letter-spacing:-.03em; transition:color .2s, transform .15s;
}
.ms {
  font-family:var(--font-d); font-size:clamp(21px,7vmin,44px);
  font-weight:300; letter-spacing:-.02em; opacity:.68;
  transition:color .2s, opacity .15s; min-width:2ch;
}
.td.pulse { animation:tp .07s ease }
@keyframes tp { 0%{transform:scale(1)} 50%{transform:scale(.963)} 100%{transform:scale(1)} }

/* cypher: glow on digits */
body.t-cypher .td, body.t-cypher .ms { text-shadow:0 0 18px var(--fg) }
body.t-cypher .half.act .td, body.t-cypher .half.act .ms { text-shadow:0 0 28px var(--fg), 0 0 60px var(--acc) }
/* aether: soft purple bloom */
body.t-aether .td, body.t-aether .ms { text-shadow:0 0 30px rgba(180,138,255,.4) }

.sinfo {
  font-family:var(--font-d); font-size:clamp(11px,2.4vw,13px);
  letter-spacing:.05em; opacity:.48;
  display:flex; align-items:center; gap:8px; min-height:17px;
  flex-wrap:wrap; justify-content:center;
}
.bdot { width:6px; height:6px; border-radius:50%; background:currentColor; opacity:.35; flex-shrink:0; transition:opacity .2s,transform .2s }
.bdot.used { opacity:.1 }
.bdot.cur  { opacity:1; transform:scale(1.5); animation:bp .9s ease-in-out infinite }
@keyframes bp { 0%,100%{transform:scale(1.5)} 50%{transform:scale(1)} }
.bprog { height:2px; background:rgba(128,128,128,.18); width:min(78%,190px); border-radius:2px; overflow:hidden }
.half.act .bprog { background:rgba(0,0,0,.12) }
.bfill { height:100%; background:currentColor; border-radius:2px }

/* tap-to-start pills — always use fg colour so readable on both dark+light halves */
.tapbox { display:flex; align-items:center; gap:8px; pointer-events:none; flex-wrap:wrap; justify-content:center }
.tapb {
  background:rgba(128,128,128,.12); border:1px solid rgba(128,128,128,.22);
  border-radius:100px; padding:7px 16px; font-size:clamp(9px,2vw,11px);
  font-weight:500; letter-spacing:.18em; text-transform:uppercase;
  color:var(--tap-c); animation:tf 1.9s ease-in-out infinite;
  font-family:var(--font-lbl);
}
.tapb.s2 { font-size:clamp(8px,1.8vw,10px); letter-spacing:.12em; animation-delay:.42s; opacity:.8 }
@keyframes tf { 0%,100%{opacity:.26;transform:translateY(2px)} 50%{opacity:.8;transform:translateY(0)} }

/* ── controls bar ─────────────────────────────────── */
.cbar {
  height:var(--bh); background:var(--cbar);
  display:flex; align-items:center; justify-content:center;
  gap:clamp(6px,2.5vw,14px); z-index:20; flex-shrink:0; position:relative;
  border-top:1px solid var(--border); border-bottom:1px solid var(--border);
  padding-left:env(safe-area-inset-left); padding-right:env(safe-area-inset-right);
}
.logo {
  position:absolute; left:max(16px,env(safe-area-inset-left,16px));
  font-family:'Playfair Display', serif; font-size:11px; font-weight:700;
  letter-spacing:.1em; color:var(--fg); opacity:.16; text-transform:uppercase;
}
@media(max-width:380px){.logo{display:none}}
.mvctr {
  font-family:var(--font-d); font-size:11px; letter-spacing:.1em;
  text-transform:uppercase; white-space:nowrap;
  color:var(--fg); opacity:.65;
  background:var(--border); border:1px solid var(--border2);
  border-radius:100px; padding:0 13px; height:30px;
  display:flex; align-items:center; gap:4px;
}
.mvctr span { font-weight:500; opacity:1 }
.cb {
  background:transparent; border:1px solid var(--border2); color:var(--fg);
  font-family:var(--font-ui); font-size:clamp(11px,2.4vw,12px);
  font-weight:500; letter-spacing:.1em; text-transform:uppercase;
  min-height:42px; padding:0 clamp(12px,3.5vw,20px); border-radius:100px;
  cursor:pointer; transition:all .18s; white-space:nowrap;
  -webkit-appearance:none; appearance:none; opacity:.65;
}
.cb:active    { transform:scale(.93); opacity:1; background:var(--border) }
@media(hover:hover){.cb:hover { opacity:1; background:var(--border); border-color:var(--fg) }}
.cb.dr { color:var(--red); border-color:var(--red); opacity:.6 }
.cb.dr:active { background:var(--acc-glow); opacity:1 }
.cb.ac { color:var(--acc); border-color:var(--acc); opacity:.68 }
.cb.ac:active { opacity:1 }
.sibtn {
  position:absolute; right:max(14px,env(safe-area-inset-right,14px));
  background:transparent; border:1px solid var(--border2); color:var(--fg);
  width:42px; height:42px; border-radius:50%; cursor:pointer; opacity:.5;
  display:flex; align-items:center; justify-content:center;
  transition:all .18s; font-size:16px; -webkit-appearance:none; appearance:none;
}
.sibtn:active { opacity:1; background:var(--border) }
@media(hover:hover){.sibtn:hover { opacity:1; background:var(--border) }}

/* wake-lock alive dot */
.wl-dot {
  position:absolute; left:max(10px,env(safe-area-inset-left,10px)); bottom:9px;
  width:5px; height:5px; border-radius:50%; background:var(--acc);
  opacity:0; transition:opacity .6s;
}
.wl-dot.alive { opacity:.45; animation:wlp 3s ease-in-out infinite }
@keyframes wlp { 0%,100%{opacity:.35} 50%{opacity:.65} }

@media(max-height:480px) and (orientation:landscape){
  :root{--bh:50px}
  .cb{min-height:34px;font-size:10px;padding:0 10px}
  .sibtn{width:34px;height:34px;font-size:13px}
  .td{font-size:clamp(30px,11vmin,58px)} .ms{font-size:clamp(13px,5vmin,26px)}
  .sinfo{font-size:10px} .plbl{font-size:9px} .tapb{padding:5px 10px;font-size:9px}
  .logo,.mvctr{display:none}
}

/* ripple */
.rip {
  position:absolute; border-radius:50%; background:currentColor; opacity:.1;
  transform:scale(0); animation:ra .6s ease-out forwards; pointer-events:none; z-index:5;
}
@keyframes ra { to{transform:scale(5);opacity:0} }

/* ── expired overlay ──────────────────────────────── */
.expov {
  position:fixed; inset:0; background:var(--red);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:100; opacity:0; pointer-events:none; transition:opacity .38s;
  gap:10px; padding:24px; padding-bottom:max(24px,env(safe-area-inset-bottom));
}
.expov.on { opacity:1; pointer-events:all }
.exptit {
  font-family:'Playfair Display', serif; font-size:clamp(26px,10vw,70px);
  font-weight:900; color:white; letter-spacing:-.02em; text-align:center;
}
.expsub { font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:rgba(255,255,255,.55); text-align:center; margin-bottom:6px }
.expbtn {
  background:white; color:var(--red); border:none; font-family:var(--font-ui);
  font-size:13px; font-weight:600; letter-spacing:.12em; text-transform:uppercase;
  padding:16px 38px; border-radius:100px; cursor:pointer; min-height:52px;
  transition:transform .18s; -webkit-appearance:none; appearance:none;
}
.expbtn:active { transform:scale(.97) }

/* ── toast ────────────────────────────────────────── */
.toast {
  position:fixed; bottom:max(28px,env(safe-area-inset-bottom,28px)); left:50%;
  transform:translateX(-50%) translateY(90px);
  background:var(--fg); color:var(--bg); font-size:13px; font-weight:500;
  padding:11px 22px; border-radius:100px; z-index:600;
  transition:transform .38s var(--ease); white-space:nowrap;
  max-width:calc(100vw - 40px); text-align:center; font-family:var(--font-ui);
}
.toast.on { transform:translateX(-50%) translateY(0) }

/* ╔══════════════════════════════════════════════════════╗
   ║  SETTINGS PAGE                                       ║
   ╚══════════════════════════════════════════════════════╝ */
#sp { background:var(--bg); overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; overscroll-behavior:contain }
.shdr {
  padding:max(44px,env(safe-area-inset-top,44px)) 20px 22px;
  border-bottom:1px solid var(--border); position:sticky; top:0;
  background:var(--bg); z-index:10;
  display:flex; align-items:flex-end; justify-content:space-between; gap:12px;
}
.stit { font-family:'Playfair Display', serif; font-size:clamp(22px,6vw,36px); font-weight:900; letter-spacing:-.02em }
.ssub { font-size:10px; letter-spacing:.22em; text-transform:uppercase; opacity:.28; margin-top:4px; font-family:var(--font-ui) }
.backbtn {
  background:transparent; border:1px solid var(--border2); color:var(--fg);
  font-family:var(--font-ui); font-size:12px; letter-spacing:.1em; text-transform:uppercase;
  padding:0 18px; border-radius:100px; cursor:pointer; transition:background .18s;
  flex-shrink:0; min-height:42px; display:flex; align-items:center;
  -webkit-appearance:none; appearance:none;
}
.backbtn:active { background:var(--border) }
.sbody { padding:22px 20px max(64px,env(safe-area-inset-bottom,64px)); max-width:580px; margin:0 auto }
.sl {
  font-size:10px; letter-spacing:.26em; text-transform:uppercase;
  opacity:.32; margin-bottom:10px; margin-top:30px; font-weight:600; font-family:var(--font-ui);
}
.sl:first-child { margin-top:0 }

/* ── theme picker ─────────────────────────────────── */
.theme-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px }
.thcard {
  border-radius:16px; overflow:hidden; cursor:pointer;
  border:2px solid transparent; transition:border-color .22s, transform .15s, box-shadow .22s;
  -webkit-appearance:none; appearance:none; padding:0; background:none; text-align:left;
}
.thcard:active { transform:scale(.95) }
.thcard.sel { border-color:var(--acc); box-shadow:0 0 0 3px var(--acc-glow) }
.th-swatch { height:56px; display:flex }
.th-a { flex:1 } .th-b { flex:1 }
.th-name {
  background:var(--bg2); padding:7px 8px 8px; font-family:var(--font-ui);
  font-size:10px; font-weight:600; letter-spacing:.14em; text-transform:uppercase;
  color:var(--fg); opacity:.48; text-align:center;
}
.thcard.sel .th-name { opacity:1; color:var(--acc) }

/* ── layout picker ────────────────────────────────── */
.laytog { display:flex; gap:8px }
.layopt {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:7px; background:var(--border); border:1px solid var(--border2);
  border-radius:14px; padding:14px 10px; cursor:pointer; min-height:72px;
  color:var(--fg); font-family:var(--font-ui); font-size:11px;
  letter-spacing:.1em; text-transform:uppercase; opacity:.42; transition:all .18s;
  -webkit-appearance:none; appearance:none;
}
.layopt:active { opacity:.8 }
.layopt.sel { background:transparent; border-color:var(--acc); color:var(--acc); opacity:1 }
.layico { font-size:19px; line-height:1 }

/* ── system dropdown ──────────────────────────────── */
.cswrap { position:relative }
.cstrig {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--border); border:1px solid var(--border2);
  border-radius:14px; padding:15px 17px; cursor:pointer; transition:opacity .18s;
  gap:12px; min-height:58px;
}
.cstrig:active { opacity:.75 }
.cstrig.open { border-color:var(--acc); border-radius:14px 14px 0 0; border-bottom-color:transparent }
.csl { display:flex; flex-direction:column; gap:3px; flex:1; min-width:0 }
.csv { font-size:clamp(13px,3.5vw,15px); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-family:var(--font-ui) }
.csd { font-size:clamp(10px,2.4vw,11px); opacity:.36; font-family:var(--font-d); white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.csar { width:26px; height:26px; border-radius:50%; border:1px solid var(--border2); display:flex; align-items:center; justify-content:center; font-size:10px; opacity:.45; flex-shrink:0; transition:transform .3s var(--ease) }
.cstrig.open .csar { transform:rotate(180deg); opacity:.75 }
.cspan {
  position:absolute; left:0; right:0; top:100%; z-index:50;
  background:var(--bg2); border:1px solid var(--acc); border-top:none;
  border-radius:0 0 14px 14px; overflow:hidden;
  max-height:0; opacity:0; pointer-events:none;
  transition:max-height .36s cubic-bezier(.4,0,.2,1), opacity .22s;
}
.cspan.open { max-height:460px; opacity:1; pointer-events:all }
.csopt {
  display:flex; align-items:center; gap:13px; padding:13px 17px;
  cursor:pointer; transition:background .14s;
  border-bottom:1px solid var(--border); min-height:58px;
}
.csopt:last-child { border-bottom:none }
.csopt:active, .csopt:hover { background:var(--border) }
.csopt.sel { background:var(--border) }
.csico { width:36px; height:36px; border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:16px; background:var(--border); border:1px solid var(--border2) }
.csopt.sel .csico { border-color:var(--acc) }
.cstxt { flex:1; min-width:0 }
.csnm { font-size:clamp(13px,3.4vw,14px); font-weight:500; font-family:var(--font-ui) }
.csht { font-size:clamp(10px,2.4vw,11px); opacity:.33; font-family:var(--font-d); margin-top:2px }
.csopt.sel .csnm { color:var(--acc) }
.csck { font-size:13px; color:var(--acc); opacity:0; transition:opacity .18s; flex-shrink:0 }
.csopt.sel .csck { opacity:1 }

/* ── time fields ──────────────────────────────────── */
.trow2 { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:13px 0; border-bottom:1px solid var(--border); flex-wrap:nowrap }
.trlhs { flex:1; min-width:0 }
.trlbl { font-size:clamp(13px,3.4vw,14px); font-weight:400; opacity:.84; font-family:var(--font-ui) }
.trsub { font-size:clamp(10px,2.4vw,11px); opacity:.28; margin-top:2px; font-family:var(--font-d); line-height:1.4 }
.tig { display:flex; align-items:center; gap:5px; flex-shrink:0 }
.tin, .cin {
  background:var(--border); border:1px solid var(--border2); color:var(--fg);
  font-family:var(--font-d); font-size:max(16px,1em); font-weight:300;
  width:54px; min-height:46px; text-align:center; padding:0 4px; border-radius:12px;
  outline:none; transition:border-color .18s; -moz-appearance:textfield;
  -webkit-appearance:none; appearance:none;
}
.tin::-webkit-inner-spin-button,.tin::-webkit-outer-spin-button,
.cin::-webkit-inner-spin-button,.cin::-webkit-outer-spin-button{-webkit-appearance:none}
.tin:focus,.cin:focus { border-color:var(--acc) }
.tcol { opacity:.24; font-family:var(--font-d); font-size:17px; flex-shrink:0 }
.tunit { margin-left:5px; font-size:11px; opacity:.26; white-space:nowrap; flex-shrink:0; font-family:var(--font-ui) }

/* ── presets ──────────────────────────────────────── */
.pgrid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:14px }
@media(min-width:460px){.pgrid{grid-template-columns:repeat(auto-fill,minmax(148px,1fr))}}
.pcard {
  background:var(--border); border:1px solid var(--border2);

}
.pcard:active { opacity:.7 }
.pcard.sel { border-color:var(--acc) }
.pnm { font-size:clamp(12px,3vw,13px); font-weight:500; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-right:20px; font-family:var(--font-ui) }
.psy { font-size:9px; opacity:.34; letter-spacing:.1em; text-transform:uppercase; margin-bottom:3px; font-family:var(--font-ui) }
.pde { font-family:var(--font-d); font-size:10px; opacity:.32; line-height:1.5 }
.pdel {
  position:absolute; top:7px; right:7px; background:rgba(224,90,78,.1); border:none;
  color:var(--red); cursor:pointer; font-size:11px; width:22px; height:22px;
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:all .18s;
  -webkit-appearance:none; appearance:none;
}
@media(hover:none){.pdel{opacity:1;pointer-events:auto}}
@media(hover:hover){.pcard:hover .pdel{opacity:1;pointer-events:auto}}
.pdel:active { background:rgba(224,90,78,.25) }
.addpbtn {
  background:transparent; border:1px dashed var(--border2);
  border-radius:14px; padding:15px; cursor:pointer; transition:opacity .18s, border-color .18s;
  color:var(--fg); opacity:.32; font-size:13px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  font-family:var(--font-ui); width:100%; min-height:50px;
  -webkit-appearance:none; appearance:none; letter-spacing:.04em;
}
.addpbtn:active { opacity:.8 }
@media(hover:hover){.addpbtn:hover{opacity:.7;border-color:var(--acc)}}

/* ── play button ──────────────────────────────────── */
.plbar { display:flex; gap:10px; margin-top:26px; padding-top:22px; border-top:1px solid var(--border) }
.playbtn {
  flex:1; background:var(--acc); color:var(--bg); border:none;
  font-family:var(--font-ui); font-size:14px; font-weight:700;
  letter-spacing:.14em; text-transform:uppercase; padding:0 24px;
  border-radius:100px; cursor:pointer; transition:all .18s; min-height:52px;
  -webkit-appearance:none; appearance:none;
}
.playbtn:active { transform:scale(.97); filter:brightness(.88) }
@media(hover:hover){.playbtn:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,.35)}}

/* ── modal ────────────────────────────────────────── */
.mback {
  position:fixed; inset:0; background:rgba(0,0,0,.82); z-index:400;
  display:flex; align-items:center; justify-content:center; padding:22px;
  opacity:0; pointer-events:none; transition:opacity .22s;
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
}
.mback.on { opacity:1; pointer-events:all }
.mbox {
  background:var(--bg2); border:1px solid var(--border2); border-radius:22px;
  padding:26px 22px 20px; width:100%; max-width:370px;
  transform:scale(.9) translateY(14px); transition:transform .28s var(--ease);
}
.mback.on .mbox { transform:scale(1) translateY(0) }
.mtit { font-family:'Playfair Display', serif; font-size:20px; font-weight:700; margin-bottom:4px }
.msub { font-size:12px; opacity:.34; font-family:var(--font-d); margin-bottom:18px; line-height:1.55 }
.minp {
  width:100%; background:var(--border); border:1px solid var(--border2); color:var(--fg);
  font-family:var(--font-ui); font-size:max(16px,1em);
  padding:13px 15px; border-radius:12px; outline:none; transition:border-color .18s;
  -webkit-appearance:none; appearance:none;
}
.minp:focus { border-color:var(--acc) }
.macts { display:flex; gap:9px; margin-top:14px }
.mcan {
  flex:1; background:var(--border); border:1px solid var(--border2); color:var(--fg);
  font-family:var(--font-ui); font-size:13px; font-weight:500; letter-spacing:.08em;
  text-transform:uppercase; padding:0 14px; border-radius:100px; cursor:pointer;
  min-height:46px; transition:opacity .18s; -webkit-appearance:none; appearance:none;
}
.mcan:active { opacity:.6 }
.mok {
  flex:2; background:var(--acc); color:var(--bg); border:none;
  font-family:var(--font-ui); font-size:13px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; padding:0 14px; border-radius:100px; cursor:pointer;
  min-height:46px; transition:all .18s; -webkit-appearance:none; appearance:none;
}
.mok:active { filter:brightness(.88) }
.mok.danger { background:var(--red); color:#fff }

/* bg2 for settings header fallback */
.shdr { background:var(--bg) }

<script>
/* ═══════════════════════════════════════════════════
   WAKE LOCK
   Three layers of defence:
   1. Screen Wake Lock API  (Chrome 84+, Safari 16.4+)
   2. Video loop trick      (iOS Safari < 16.4)
   3. Interval tap trick    (last resort — plays 0-duration audio)
═══════════════════════════════════════════════════ */
var WL = {
  lock: null,        // WakeLockSentinel
  video: null,       // <video> element for iOS fallback
  intervalId: null,  // last-resort interval
  active: false,

  // tiny transparent 1×1 mp4, ~180 bytes, loops indefinitely
  // this keeps iOS Safari from sleeping
  MP4_URI: (function(){
    var b64 = 'AAAAIGZ0eXBpc29tAAACAGlzb21pc28yYXZjMW1wNDEAAAAIZnJlZQAAA' +
      'u1tZGF0AAACrAYF//+o3EXpvebZSLeWLNgg2SPu73gyNjQgLSBjb3JlIDE0MiBy' +
      'MjM4OSA5NTZjOGQ4IC0gSC4yNjQvTVBFRy00IEFWQyBjb2RlYyAtIENvcHlsZWZ0' +
      'IDIwMDMtMjAxNCAtIGh0dHA6Ly93d3cudmlkZW9sYW4ub3JnL3gyNjQuaHRtbCAt' +
      'IG9wdGlvbnM6IGNhYmFjPTEgcmVmPTMgZGVibG9jaz0xOjA6MCBhbmFseXNlPTB4' +
      'MzoweDExMyBtZT1oZXggc3VibWU9NyBwc3k9MSBwc3lfcmQ9MS4wMDowLjAwIG1p' +
      'eGVkX3JlZj0xIG1lX3JhbmdlPTE2IGNocm9tYV9tZT0xIHRyZWxsaXM9MSA4eDhk' +
      'Y3Q9MSBjcW09MCBkZWFkem9uZT0yMSwxMSBmYXN0X3Bza2lwPTEgY2hyb21hX3Fw' +
      'X29mZnNldD0tMiBfcmFtZXM9MCBkZWNpbWF0ZT0xIGludGVybGFjZWQ9MCBibHVy' +
      'YXlfY29tcGF0PTAgY29uc3RyYWluZWRfaW50cmE9MCBiZnJhbWVzPTMgYl9weXJh' +
      'bWlkPTIgYl9hZGFwdD0xIGJfYmlhcz0wIGRpcmVjdD0xIHdlaWdodGI9MSBvcGVu' +
      'X2dvcD0wIHdlaWdodHA9MiBrZXlpbnQ9MjUwIGtleWludF9taW49MjUgc2NlbmVj' +
      'dXQ9NDAgaW50cmFfcmVmcmVzaD0wIHJjX2xvb2thaGVhZD00MCByYz1jcmYgbWJ0' +
      'cmVlPTEgY3JmPTI4LjAgcWNvbXA9MC42MCBxcG1pbj0wIHFwbWF4PTY5IHFwc3Rl' +
      'cD00IGlwX3JhdGlvPTEuNDAgYXE9MToxLjAwAIAAAAFZZYiEAD//8fnt/AgaWFhQ' +
      'gACBgQWjMTHbhNdXNSJPBSJ5SAlIAAADAAADAAADAAQ0AAARAAADAAA4+YAAAKAG' +
      'AoKAAAAwAAAwAAAwAQQAAAIAAAIAAAIAAAQAAAAwAAAwAA';
    return 'data:video/mp4;base64,' + b64;
  })(),

  _buildVideo: function(){
    if(this.video) return;
    var v = document.createElement('video');
    v.setAttribute('playsinline',''); v.setAttribute('muted',''); v.setAttribute('loop','');
    v.style.cssText='position:fixed;width:1px;height:1px;top:-2px;left:-2px;opacity:0;pointer-events:none';
    v.src = this.MP4_URI;
    document.body.appendChild(v);
    this.video = v;
  },

  _setDot: function(on){
    var d = document.getElementById('wlDot');
    if(d){ d.classList.toggle('alive', on); }
    this.active = on;
  },

  acquire: async function(){
    // Layer 1: Screen Wake Lock API
    if('wakeLock' in navigator){
      try{
        this.lock = await navigator.wakeLock.request('screen');
        var self = this;
        this.lock.addEventListener('release', function(){
          self.lock = null;
          self._setDot(false);
          // Auto-reacquire if game is still running
          if(gs && gs.phase === 'running') self.acquire();
        });
        this._setDot(true);
        return;
      }catch(e){ /* fall through */ }
    }

    // Layer 2: Looping video (iOS Safari)
    try{
      this._buildVideo();
      await this.video.play();
      this._setDot(true);
      return;
    }catch(e){ /* fall through */ }

    // Layer 3: Audio context keepalive (last resort)
    try{
      if(!this.intervalId){
        var self2 = this;
        this.intervalId = setInterval(function(){
          if(!self2.active) return;
          try{
            var ctx = new(window.AudioContext||window.webkitAudioContext)();
            var buf = ctx.createBuffer(1,1,22050);
            var src = ctx.createBufferSource();
            src.buffer = buf; src.connect(ctx.destination); src.start(0);
            setTimeout(function(){ctx.close()},100);
          }catch(e){}
        }, 25000);
      }
      this._setDot(true);
    }catch(e){}
  },

  release: function(){
    if(this.lock){ try{this.lock.release()}catch(e){} this.lock = null; }
    if(this.video && !this.video.paused){ try{this.video.pause()}catch(e){} }
    if(this.intervalId){ clearInterval(this.intervalId); this.intervalId = null; }
    this._setDot(false);
  }
};

// Re-acquire after browser auto-releases on tab switch
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState === 'visible' && gs && gs.phase === 'running'){
    WL.acquire();
  }
});

/* ═══════════════════════════════════════════════════
   THEMES
═══════════════════════════════════════════════════ */
var THEMES = [
  { id:'obsidian', name:'Obsidian', a:'#0a0a0a', b:'#f5f0e8', meta:'#0a0a0a' },
  { id:'kaya',     name:'Kaya',     a:'#1e1509', b:'#e8d4a0', meta:'#1e1509' },
  { id:'cypher',   name:'Cypher',   a:'#000000', b:'#00e87a', meta:'#000000' },
  { id:'aether',   name:'Aether',   a:'#07051a', b:'#b48aff', meta:'#07051a' }
];

var curTheme = localStorage.getItem('gc5_theme') || 'obsidian';

function applyTheme(id){
  curTheme = id;
  localStorage.setItem('gc5_theme', id);
  document.body.className = document.body.className.replace(/\bt-\S+/g,'').trim();
  if(id !== 'obsidian') document.body.classList.add('t-' + id);
  var t = THEMES.find(function(x){ return x.id===id }) || THEMES[0];
  document.getElementById('tcMeta').setAttribute('content', t.meta);
  document.querySelectorAll('.thcard').forEach(function(c){
    c.classList.toggle('sel', c.dataset.tid === id);
  });
}

function buildThemeGrid(){
  var g = document.getElementById('themeGrid');
  g.innerHTML = '';
  THEMES.forEach(function(t){
    var btn = document.createElement('button');
    btn.className = 'thcard' + (t.id===curTheme?' sel':'');
    btn.dataset.tid = t.id;
    btn.innerHTML = '<div class="th-swatch">'
      + '<div class="th-a" style="background:'+t.a+'"></div>'
      + '<div class="th-b" style="background:'+t.b+'"></div>'
      + '</div><div class="th-name">'+t.name+'</div>';
    btn.addEventListener('click', function(){ applyTheme(t.id); });
    g.appendChild(btn);
  });
}

/* ═══════════════════════════════════════════════════
   TIME SYSTEMS
═══════════════════════════════════════════════════ */
var SYS = {
  japanese:{
    id:'japanese',name:'Japanese Byo-Yomi',icon:'🎌',
    sd:'Main time + timed periods per move',
    def:{mainTime:180,byoTime:30,byoCount:5},
    fields:[
      {id:'mainTime',lbl:'Main Time',      sub:'Total thinking time before byo-yomi starts',t:'mm'},
      {id:'byoTime', lbl:'Period Duration',sub:'Time allowed per byo-yomi period',t:'mm'},

    rules:'<strong>Japanese Byo-Yomi</strong> — Fixed main time, then timed periods. <strong>Each move must finish within one period.</strong> Lose all periods and you lose.',

  },
  sudden:{
    id:'sudden',name:'Sudden Death',icon:'☠️',

    def:{mainTime:300},
    fields:[{id:'mainTime',lbl:'Total Time',sub:'All time per player — no overtime',t:'mm'}],
    rules:'<strong>Sudden Death</strong> — One block of time each. <strong>Run out and you lose immediately.</strong>',
    tl:'Sudden Death'
  },

    sd:'Main time + moves-per-period overtime',
    def:{mainTime:180,byoTime:60,movesPerPeriod:10},
    fields:[
      {id:'mainTime',      lbl:'Main Time',      sub:'Thinking time before byo-yomi',t:'mm'},
      {id:'byoTime',       lbl:'Period Duration', sub:'Time to complete required moves',t:'mm'},
      {id:'movesPerPeriod',lbl:'Moves/Period',    sub:'Moves required per period',t:'ct',unit:'moves'}
    ],
    rules:'<strong>Canadian Byo-Yomi</strong> — Complete a set number of moves within each period. Run out and you lose.',
    tl:'Canadian'
  },
  fischer:{

    sd:'Seconds added after every move',
    def:{mainTime:180,increment:10},
    fields:[
      {id:'mainTime', lbl:'Starting Time',sub:'Starting clock time',t:'mm'},
      {id:'increment',lbl:'Increment',    sub:'Seconds added after each move',t:'ct',unit:'sec/move'}
    ],

  },
  simple:{

    tl:'Per Move'
  }
};
var SORD = ['japanese','sudden','canadian','fischer','simple'];
var DEFS = {system:'japanese',mainTime:180,byoTime:30,byoCount:5,movesPerPeriod:10,increment:10,moveTime:30};

/* ═══════════════════════════════════════════════════
   STORAGE  (gc5_ namespace)
═══════════════════════════════════════════════════ */
function lsGet(k){try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function loadSettings(){ var s=lsGet('gc5_s'); return (s&&s.system)?Object.assign({},DEFS,s):Object.assign({},DEFS) }
function saveSettings(s){ lsSet('gc5_s',s); cfg=s }
function loadPresets(){ var p=lsGet('gc5_p'); return (Array.isArray(p)&&p.length)?p:[] }
function savePresets(p){ lsSet('gc5_p',p); presets=p }
function loadLayout(){ return localStorage.getItem('gc5_l')||'stacked' }
function saveLayout(l){ localStorage.setItem('gc5_l',l) }

var cfg     = loadSettings();
var presets = loadPresets();

/* ═══════════════════════════════════════════════════
   GAME STATE  (time in milliseconds)
═══════════════════════════════════════════════════ */
var gs = {phase:'idle',active:null,p1:null,p2:null,moves:0};
var rafId = null, lastTick = 0;

function mkP(){
  var s=cfg, sys=s.system;
  if(sys==='japanese') return {main:s.mainTime*1000,byoLeft:s.byoTime*1000,byoCount:s.byoCount,byoTotal:s.byoTime*1000,inByo:s.mainTime===0};
  if(sys==='sudden')   return {main:s.mainTime*1000};
  if(sys==='canadian') return {main:s.mainTime*1000,byoLeft:s.byoTime*1000,byoTotal:s.byoTime*1000,movInPer:0,movReq:s.movesPerPeriod,inByo:s.mainTime===0};
  if(sys==='fischer')  return {main:s.mainTime*1000,inc:s.increment*1000};
  if(sys==='simple')   return {main:s.moveTime*1000,movTot:s.moveTime*1000};
}
function initP(){ gs.p1=mkP(); gs.p2=mkP(); gs.moves=0; updMVC() }

/* ═══════════════════════════════════════════════════
   DISPLAY
═══════════════════════════════════════════════════ */
function gel(id){ return document.getElementById(id) }

function fmtSec(ms){
  var neg=ms<0; ms=Math.abs(ms);
  var tot=Math.ceil(ms/1000), m=Math.floor(tot/60), s=tot%60;
  return (neg?'-':'')+(m>0?m+':'+String(s).padStart(2,'0'):String(s));
}
function fmtTenths(ms){ return ms>=0?('.'+Math.floor((ms%1000)/100)):''; }
function showMs(ms){ return ms>=0 && ms<10000; }

function updMVC(){
  var el=gel('mvc');
  if(gs.phase==='idle'||gs.phase==='expired'){ el.style.display='none'; return }
  el.style.display=''; gel('mvn').textContent=gs.moves;
}

function updDisplay(pid){
  var p=pid===1?gs.p1:gs.p2, sys=cfg.system;
  var tEl=gel('t'+pid), msEl=gel('ms'+pid), sEl=gel('s'+pid);
  var pEl=gel('pr'+pid), fEl=gel('pf'+pid);
  for(var i=0;i<5;i++) gel('d'+pid+'-'+i).style.display='none';
  pEl.style.display='none';
  var displayMs=0;

  if(sys==='japanese'){
    if(!p.inByo){
      displayMs=p.main; tEl.textContent=fmtSec(p.main);
      sEl.textContent='× '+p.byoCount+' byo-yomi'; dots(pid,p.byoCount,cfg.byoCount,false);
    } else {
      displayMs=p.byoLeft; tEl.textContent=fmtSec(p.byoLeft);
      sEl.textContent=p.byoCount>1?(p.byoCount+' periods left'):'Last period!';
      dots(pid,p.byoCount,cfg.byoCount,true);
      pEl.style.display='block'; fEl.style.width=Math.max(0,(p.byoLeft/p.byoTotal)*100)+'%';
    }
  } else if(sys==='sudden'){
    displayMs=p.main; tEl.textContent=fmtSec(p.main); sEl.textContent='Sudden death';
  } else if(sys==='canadian'){
    if(!p.inByo){
      displayMs=p.main; tEl.textContent=fmtSec(p.main); sEl.textContent=cfg.movesPerPeriod+' moves / period';
    } else {
      displayMs=p.byoLeft; tEl.textContent=fmtSec(p.byoLeft);
      var mv=p.movReq-p.movInPer; sEl.textContent=mv+' move'+(mv!==1?'s':'')+' left';
      pEl.style.display='block'; fEl.style.width=Math.max(0,(p.byoLeft/p.byoTotal)*100)+'%';
    }
  } else if(sys==='fischer'){
    displayMs=p.main; tEl.textContent=fmtSec(p.main); sEl.textContent='+'+cfg.increment+'s / move';
  } else if(sys==='simple'){
    displayMs=p.main; tEl.textContent=fmtSec(p.main); sEl.textContent='per move';
    pEl.style.display='block'; fEl.style.width=Math.max(0,(p.main/p.movTot)*100)+'%';
  }

  var isActive = (gs.phase==='running' && gs.active===pid);
  if(isActive && showMs(displayMs)){
    msEl.textContent=fmtTenths(displayMs); msEl.style.opacity='.68';
  } else {
    msEl.textContent=''; msEl.style.opacity='0';
  }
}

function dots(pid,rem,tot,inByo){
  var show=Math.min(tot,5);
  for(var i=0;i<5;i++){
    var d=gel('d'+pid+'-'+i);
    if(i>=show){ d.style.display='none'; continue }
    d.style.display=''; d.className='bdot';
    if(rem<=i) d.classList.add('used');
    else if(inByo&&i===rem-1) d.classList.add('cur');
  }
}

function updHalves(){
  var h1=gel('h1'), h2=gel('h2'), th1=gel('th1'), th2=gel('th2');
  h1.className='half top'; h2.className='half bot';
  if(gs.phase==='idle'){
    h1.classList.add('off'); h2.classList.add('off');
    th1.style.display='flex'; th2.style.display='flex';
  } else {
    th1.style.display='none'; th2.style.display='none';
    if(gs.active===1){ h1.classList.add('act'); h2.classList.add('off') }
    else if(gs.active===2){ h2.classList.add('act'); h1.classList.add('off') }
    else { h1.classList.add('off'); h2.classList.add('off') }
  }
}

/* ═══════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════ */
var curLayout = loadLayout();
function applyLayout(l){ curLayout=l; gel('cp').classList.toggle('sbs',l==='side'); gel('lStk').classList.toggle('sel',l==='stacked'); gel('lSbs').classList.toggle('sel',l==='side') }
function setLayout(l){ applyLayout(l); saveLayout(l) }

/* ═══════════════════════════════════════════════════
   AUDIO
═══════════════════════════════════════════════════ */
var actx;
function getActx(){ if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)(); return actx }
function playPop(){
  try{
    var c=getActx(),n=c.currentTime;
    [[800,200,.28,.08,'square'],[1200,600,.14,.05,'sine']].forEach(function(a){
      var o=c.createOscillator(),g=c.createGain();
      o.type=a[4]; o.frequency.setValueAtTime(a[0],n); o.frequency.exponentialRampToValueAtTime(a[1],n+a[3]);
      g.gain.setValueAtTime(a[2],n); g.gain.exponentialRampToValueAtTime(.001,n+a[3]);
      o.connect(g); g.connect(c.destination); o.start(n); o.stop(n+a[3]);
    });
  }catch(e){}
}
function playBeep(urg){
  try{
    var c=getActx(),n=c.currentTime,f=500+urg*480,d=.17-urg*.08;
    var o=c.createOscillator(),g=c.createGain();
    o.type='sine'; o.frequency.setValueAtTime(f,n);
    g.gain.setValueAtTime(0,n); g.gain.linearRampToValueAtTime(.26,n+.01);
    g.gain.setValueAtTime(.26,n+d*.5); g.gain.exponentialRampToValueAtTime(.0001,n+d);
    o.connect(g); g.connect(c.destination); o.start(n); o.stop(n+d+.02);
  }catch(e){}
}
function setDanger(pid,on){ gel('h'+pid).classList.toggle('dp',on) }

/* ═══════════════════════════════════════════════════
   TICK  (requestAnimationFrame, ms-accurate)
═══════════════════════════════════════════════════ */
function startRAF(){ if(rafId) return; lastTick=performance.now(); rafId=requestAnimationFrame(rafLoop) }
function stopRAF(){ if(rafId){ cancelAnimationFrame(rafId); rafId=null } }
function rafLoop(now){
  if(gs.phase!=='running'){ stopRAF(); return }
  tickMs(now-lastTick); lastTick=now;
  rafId=requestAnimationFrame(rafLoop);
}

function byoTh(totMs){ return totMs<=10000?5000:10000 }
var lastBeepSec={1:-1,2:-1};
function beepIfNeeded(pid,msLeft,threshold){
  var sec=Math.ceil(msLeft/1000);
  if(sec!==lastBeepSec[pid]){
    lastBeepSec[pid]=sec;
    playBeep(Math.max(0,Math.min(1,1-(msLeft/threshold))));
    (function(p){var e=gel('t'+p);e.classList.remove('pulse');void e.offsetWidth;e.classList.add('pulse')})(pid);
  }
}

function tickMs(dt){
  var pid=gs.active, p=pid===1?gs.p1:gs.p2, sys=cfg.system;
  if(sys==='japanese'){
    if(!p.inByo){
      p.main-=dt;
      if(p.main<=0){p.main=0;p.inByo=true;setDanger(pid,false)}
      else if(p.main<=10000){beepIfNeeded(pid,p.main,10000);setDanger(pid,true)} else setDanger(pid,false);
    }
    if(p.inByo){
      p.byoLeft-=dt;
      if(p.byoLeft<=0){
        p.byoCount-=1;
        if(p.byoCount<=0){setDanger(pid,false);expire();return}
        p.byoLeft=p.byoTotal; setDanger(pid,false);
      } else { var th=byoTh(p.byoTotal); if(p.byoLeft<=th){beepIfNeeded(pid,p.byoLeft,th);setDanger(pid,true)} else setDanger(pid,false); }
    }
  } else if(sys==='sudden'){
    p.main-=dt;
    if(p.main<=0){setDanger(pid,false);expire();return}
    if(p.main<=10000){beepIfNeeded(pid,p.main,10000);setDanger(pid,true)} else setDanger(pid,false);
  } else if(sys==='canadian'){
    if(!p.inByo){
      p.main-=dt;
      if(p.main<=0){p.main=0;p.inByo=true;p.byoLeft=p.byoTotal;p.movInPer=0;setDanger(pid,false)}
      else if(p.main<=10000){beepIfNeeded(pid,p.main,10000);setDanger(pid,true)} else setDanger(pid,false);
    } else {
      p.byoLeft-=dt;
      if(p.byoLeft<=0){setDanger(pid,false);expire();return}
      var th2=byoTh(p.byoTotal); if(p.byoLeft<=th2){beepIfNeeded(pid,p.byoLeft,th2);setDanger(pid,true)} else setDanger(pid,false);
    }
  } else if(sys==='fischer'){
    p.main-=dt;
    if(p.main<=0){setDanger(pid,false);expire();return}
    if(p.main<=10000){beepIfNeeded(pid,p.main,10000);setDanger(pid,true)} else setDanger(pid,false);
  } else if(sys==='simple'){
    p.main-=dt;
    if(p.main<=0){setDanger(pid,false);expire();return}
    var th3=byoTh(p.movTot); if(p.main<=th3){beepIfNeeded(pid,p.main,th3);setDanger(pid,true)} else setDanger(pid,false);
  }
  updDisplay(pid);
  gel('ms'+(pid===1?2:1)).textContent='';
}

function expire(){
  stopRAF(); WL.release();
  gs.phase='expired'; updDisplay(gs.active); updHalves(); updMVC();
  gel('expwho').textContent=(gs.active===1?'Black':'White')+' loses on time';
  gel('expov').classList.add('on');
}

/* ═══════════════════════════════════════════════════
   GAME CONTROL
═══════════════════════════════════════════════════ */
function switchTurn(fromPid){
  if(gs.phase==='expired') return;
  if(gs.phase==='idle'){
    initP(); updDisplay(1); updDisplay(2); setDanger(1,false); setDanger(2,false);
    lastBeepSec={1:-1,2:-1}; playPop(); ripple(fromPid);
    startP(fromPid===1?2:1); return;
  }
  if(gs.phase==='paused') return;
  if(gs.active!==fromPid) return;
  var p=fromPid===1?gs.p1:gs.p2, sys=cfg.system;
  if(sys==='japanese'&&p.inByo) p.byoLeft=p.byoTotal;
  if(sys==='canadian'&&p.inByo){ p.movInPer+=1; if(p.movInPer>=p.movReq){p.movInPer=0;p.byoLeft=p.byoTotal} }
  if(sys==='fischer') p.main+=p.inc;
  if(sys==='simple')  p.main=p.movTot;
  gs.moves+=1; setDanger(fromPid,false); lastBeepSec[fromPid]=-1;
  playPop(); ripple(fromPid); startP(fromPid===1?2:1); updMVC();
}

function startP(pid){
  if(cfg.system==='simple'){ var np=pid===1?gs.p1:gs.p2; np.main=np.movTot }
  gs.active=pid; gs.phase='running'; lastBeepSec[pid]=-1;
  updHalves(); stopRAF(); lastTick=performance.now(); startRAF();
  WL.acquire();  // ← keep screen awake
}

function togglePause(){
  if(gs.phase==='idle'||gs.phase==='expired') return;
  if(gs.phase==='running'){
    gs.phase='paused'; stopRAF(); WL.release();
    gel('btnP').textContent='Resume';
  } else {
    gs.phase='running'; lastTick=performance.now(); startRAF(); WL.acquire();
    gel('btnP').textContent='Pause';
  }
  updHalves();
}

function resetGame(){
  stopRAF(); WL.release();
  gs.phase='idle'; gs.active=null; initP();
  gel('btnP').textContent='Pause'; gel('expov').classList.remove('on');
  setDanger(1,false); setDanger(2,false); lastBeepSec={1:-1,2:-1};
  updDisplay(1); updDisplay(2); updHalves(); updTapLbls(); updMVC();
}

function ripple(pid){
  var h=gel('h'+pid), r=document.createElement('div');
  r.className='rip'; r.style.cssText='width:130px;height:130px;left:50%;top:50%;margin-left:-65px;margin-top:-65px;';
  h.appendChild(r); setTimeout(function(){r.remove()},700);
}

/* ═══════════════════════════════════════════════════
   SETTINGS UI
═══════════════════════════════════════════════════ */
var ddOpen=false, curSys=cfg.system;
function toggleDD(){ ddOpen=!ddOpen; gel('cstrig').classList.toggle('open',ddOpen); gel('cspan').classList.toggle('open',ddOpen) }
function closeDD(){ ddOpen=false; gel('cstrig').classList.remove('open'); gel('cspan').classList.remove('open') }
function buildDD(){
  var pan=gel('cspan'); pan.innerHTML='';
  SORD.forEach(function(id){
    var sys=SYS[id],opt=document.createElement('div');
    opt.className='csopt'+(id===curSys?' sel':''); opt.dataset.id=id;
    opt.innerHTML='<div class="csico">'+sys.icon+'</div><div class="cstxt"><div class="csnm">'+sys.name+'</div><div class="csht">'+sys.sd+'</div></div><div class="csck">✓</div>';
    opt.addEventListener('click',function(){selSys(id)}); pan.appendChild(opt);
  });
}
function selSys(id){
  curSys=id; var sys=SYS[id];
  gel('csv').textContent=sys.name; gel('csd').textContent=sys.sd; gel('ssub').textContent=sys.name;
  gel('cspan').querySelectorAll('.csopt').forEach(function(o){ o.classList.toggle('sel',o.dataset.id===id) });
  buildTF(id); buildRules(id); closeDD();
}
function buildTF(sysId){
  var sys=SYS[sysId],con=gel('tfields'); con.innerHTML='';
  if(!sys.fields.length) return;
  var lbl=document.createElement('div'); lbl.className='sl'; lbl.textContent='Time Settings'; lbl.style.marginTop='28px'; con.appendChild(lbl);
  sys.fields.forEach(function(f){
    var val=(cfg[f.id]!==undefined)?cfg[f.id]:sys.def[f.id];
    var row=document.createElement('div'); row.className='trow2';
    var inp='';
    if(f.t==='mm'){
      var m=Math.floor(val/60),s=val%60;
      inp='<div class="tig"><input class="tin" type="number" id="fi_'+f.id+'_m" min="0" max="999" value="'+m+'"><span class="tcol">:</span><input class="tin" type="number" id="fi_'+f.id+'_s" min="0" max="59" value="'+String(s).padStart(2,'0')+'"></div>';
    } else {
      inp='<div class="tig"><input class="cin" type="number" id="fi_'+f.id+'" min="1" max="999" value="'+val+'"><span class="tunit">'+(f.unit||'')+'</span></div>';
    }
    row.innerHTML='<div class="trlhs"><div class="trlbl">'+f.lbl+'</div><div class="trsub">'+f.sub+'</div></div>'+inp;
    con.appendChild(row);
  });
}
function buildRules(sysId){ gel('rtxt').innerHTML=SYS[sysId].rules }
function readTF(){
  var sys=SYS[curSys],out={system:curSys};
  sys.fields.forEach(function(f){
    if(f.t==='mm'){ var m=parseInt(gel('fi_'+f.id+'_m').value)||0,s=parseInt(gel('fi_'+f.id+'_s').value)||0; out[f.id]=m*60+s; }
    else { out[f.id]=Math.max(1,parseInt(gel('fi_'+f.id).value)||1); }
  });
  return Object.assign({},DEFS,out);
}
function loadSUI(){
  curSys=cfg.system; var sys=SYS[curSys];
  gel('csv').textContent=sys.name; gel('csd').textContent=sys.sd; gel('ssub').textContent=sys.name;
  buildDD(); buildTF(curSys); buildRules(curSys);
  gel('lStk').classList.toggle('sel',curLayout==='stacked'); gel('lSbs').classList.toggle('sel',curLayout==='side');
  buildThemeGrid();
}
function applyAndPlay(){ var s=readTF(); saveSettings(s); resetGame(); showClock() }
function showSettings(){
  if(gs.phase==='running') togglePause();
  gel('cp').classList.add('hidden'); gel('sp').classList.remove('hidden');
  loadSUI(); renderPresets();
}
function showClock(){ gel('sp').classList.add('hidden'); gel('cp').classList.remove('hidden') }

/* ═══════════════════════════════════════════════════
   PRESETS
═══════════════════════════════════════════════════ */
function fmtD(s){ if(s<=0)return'0s'; if(s>=60&&s%60===0)return Math.floor(s/60)+'m'; if(s>=60)return Math.floor(s/60)+'m'+String(s%60)+'s'; return s+'s' }
function pLabel(p){
  if(p.system==='japanese') return fmtD(p.mainTime)+' + '+p.byoCount+'×'+fmtD(p.byoTime);
  if(p.system==='sudden')   return fmtD(p.mainTime)+' Sudden Death';
  if(p.system==='canadian') return fmtD(p.mainTime)+' + '+p.movesPerPeriod+'mv/'+fmtD(p.byoTime);
  if(p.system==='fischer')  return fmtD(p.mainTime)+' +'+p.increment+'s';
  if(p.system==='simple')   return fmtD(p.moveTime)+' / move';
  return '';
}
function savePreset(){
  var s=readTF();
  showModal({title:'Save Preset',sub:'Name this configuration',ph:'e.g. Tournament 30m',def:pLabel(s),ok:'Save',
    cb:function(name){ presets.push(Object.assign({name:name},s)); savePresets(presets); renderPresets(); toast('"'+name+'" saved') }});
}
function delPreset(i){ presets.splice(i,1); savePresets(presets); renderPresets() }
function loadPreset(i){ cfg=Object.assign({},DEFS,presets[i]); saveSettings(cfg); loadSUI(); renderPresets(); toast('Loaded "'+presets[i].name+'"') }
function renderPresets(){
  var g=gel('pgrid'); g.innerHTML='';
  if(!presets.length){ g.innerHTML='<div style="grid-column:1/-1;font-size:12px;opacity:.28;padding:6px 0">No presets saved yet.</div>'; return }
  presets.forEach(function(p,i){
    var si=SYS[p.system], c=document.createElement('div');
    c.className='pcard'+(p.system===cfg.system&&pLabel(p)===pLabel(cfg)?' sel':'');
    c.innerHTML='<div class="pnm">'+esc(p.name)+'</div><div class="psy">'+(si?si.icon+' '+si.name:p.system)+'</div><div class="pde">'+esc(pLabel(p))+'</div><button class="pdel" aria-label="Delete">✕</button>';
    c.querySelector('.pdel').addEventListener('click',function(e){e.stopPropagation();delPreset(i)});
    c.addEventListener('click',function(){loadPreset(i)});
    g.appendChild(c);
  });
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

/* ═══════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════ */
var modalCB=null;
function showModal(o){
  modalCB=o.cb||null; gel('mtit').textContent=o.title||''; gel('msub').textContent=o.sub||'';
  var inp=gel('minp'); inp.placeholder=o.ph||''; inp.value=o.def||''; inp.style.display=o.noInp?'none':'block';
  var btn=gel('mok'); btn.textContent=o.ok||'OK'; btn.className='mok'+(o.danger?' danger':'');
  gel('mback').classList.add('on');
  if(!o.noInp) setTimeout(function(){inp.focus();inp.select()},260);
}
function closeModal(){ gel('mback').classList.remove('on'); modalCB=null }
function confirmModal(){
  var inp=gel('minp'),noInp=inp.style.display==='none',val=noInp?'__ok__':inp.value.trim();
  if(!noInp&&!val){inp.focus();return}
  closeModal(); if(modalCB) modalCB(val);
}

/* ═══════════════════════════════════════════════════
   TOAST / TAP LABELS
═══════════════════════════════════════════════════ */
var toastT;
function toast(msg){ var t=gel('toast'); t.textContent=msg; t.classList.add('on'); clearTimeout(toastT); toastT=setTimeout(function(){t.classList.remove('on')},2500) }
function updTapLbls(){ var l=SYS[cfg.system]?SYS[cfg.system].tl:''; gel('tl1').textContent=l; gel('tl2').textContent=l }

/* ═══════════════════════════════════════════════════
   EVENT WIRING
═══════════════════════════════════════════════════ */
[['h1',1],['h2',2]].forEach(function(pair){
  var el=gel(pair[0]),pid=pair[1],sup=false;
  el.addEventListener('touchstart',function(e){e.preventDefault();switchTurn(pid)},{passive:false});
  el.addEventListener('touchend',function(){sup=true;setTimeout(function(){sup=false},500)},{passive:true});
  el.addEventListener('click',function(e){if(sup){e.stopImmediatePropagation();return}switchTurn(pid)},true);
});
gel('btnR').addEventListener('click',resetGame);
gel('btnP').addEventListener('click',togglePause);
gel('btnS').addEventListener('click',showSettings);
gel('btnBk').addEventListener('click',showClock);
gel('btnPl').addEventListener('click',applyAndPlay);
gel('btnAP').addEventListener('click',savePreset);
gel('btnER').addEventListener('click',resetGame);
gel('lStk').addEventListener('click',function(){setLayout('stacked')});
gel('lSbs').addEventListener('click',function(){setLayout('side')});
gel('cstrig').addEventListener('click',toggleDD);
document.addEventListener('click',function(e){if(ddOpen&&!gel('cswrap').contains(e.target))closeDD()});
gel('mcan').addEventListener('click',closeModal);
gel('mok').addEventListener('click',confirmModal);
gel('mback').addEventListener('click',function(e){if(e.target===gel('mback'))closeModal()});
gel('minp').addEventListener('keydown',function(e){if(e.key==='Enter')confirmModal();if(e.key==='Escape')closeModal()});
document.addEventListener('touchmove',function(e){if(!gel('sp').classList.contains('hidden'))return;e.preventDefault()},{passive:false});
document.addEventListener('keydown',function(e){
  if(!gel('sp').classList.contains('hidden')) return;
  if(gel('mback').classList.contains('on')) return;
  if(e.code==='Space'||e.code==='Enter'){e.preventDefault();if(gs.active!==null)switchTurn(gs.active);else switchTurn(2)}
  if(e.code==='KeyP') togglePause();
  if(e.code==='KeyR') resetGame();
});

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
applyTheme(curTheme);
applyLayout(curLayout);
initP();
updDisplay(1); updDisplay(2);
updHalves(); updTapLbls(); updMVC();
</script>
