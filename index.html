<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Go Clock</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Firebase compat (no ES modules needed) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--fg:#f5f0e8;--acc:#c8a96e;--red:#e05a4e;--grn:#6dbf7a;
  --r:24px;--bh:68px;--ease:cubic-bezier(.34,1.56,.64,1)
}
html{-webkit-text-size-adjust:100%}
html,body{height:100%;height:100dvh;overflow:hidden;font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--fg);user-select:none;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation}

/* pages */
.page{position:fixed;inset:0;display:flex;flex-direction:column;
  transition:opacity .35s,transform .35s}
.page.hidden{opacity:0;pointer-events:none;transform:translateY(16px)}

/* clock layout */
#cp{flex-direction:column}
#cp.sbs{flex-direction:row}
#cp.sbs .half.top{border-radius:0 var(--r) var(--r) 0;transform-origin:center left}
#cp.sbs .half.bot{border-radius:var(--r) 0 0 var(--r);transform-origin:center right}
#cp.sbs .half.top .inn{transform:none}
#cp.sbs .half.act.top{box-shadow:20px 0 80px rgba(245,240,232,.22);transform:translateX(-5px)}
#cp.sbs .half.act.bot{box-shadow:-20px 0 80px rgba(245,240,232,.22);transform:translateX(5px)}
#cp.sbs .cbar{flex-direction:column;width:var(--bh);height:100%;border-top:none;border-bottom:none;
  border-left:1px solid rgba(245,240,232,.06);border-right:1px solid rgba(245,240,232,.06);
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);gap:12px}
#cp.sbs .logo{position:static;writing-mode:vertical-rl;transform:rotate(180deg);margin-bottom:auto}
#cp.sbs .sibtn{position:static;margin-top:auto}
#cp.sbs .mvctr{writing-mode:vertical-rl}
#cp.sbs .rbar{writing-mode:vertical-rl;width:auto;border-bottom:none;
  border-right:1px solid rgba(245,240,232,.06)}

/* halves */
.half{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;position:relative;
  transition:background .3s,box-shadow .4s,transform .4s var(--ease),filter .3s;
  outline:none;gap:clamp(10px,2vh,16px);padding:clamp(16px,4vw,30px)}
.half.top{transform-origin:center top;border-radius:0 0 var(--r) var(--r)}
.half.bot{transform-origin:center bottom;border-radius:var(--r) var(--r) 0 0}
.half.off{background:var(--bg);color:var(--fg);filter:brightness(.7)}
.half.act{background:var(--fg);color:var(--bg)}
.half.act.bot{box-shadow:0 -20px 80px rgba(245,240,232,.22);transform:translateY(-5px)}
.half.act.top{box-shadow:0 20px 80px rgba(245,240,232,.22);transform:translateY(5px)}
.half.lk{cursor:not-allowed}

/* danger */
.half.dp::after{content:'';position:absolute;inset:0;border-radius:inherit;
  pointer-events:none;z-index:2;animation:de .55s ease-in-out infinite}
@keyframes de{
  0%,100%{box-shadow:inset 0 0 0 0 rgba(160,10,0,0);background:rgba(160,10,0,0)}
  50%{box-shadow:inset 0 0 160px 60px rgba(160,10,0,.72);background:rgba(160,10,0,.08)}
}
.half.dp .td{color:#c81500!important}

/* inner */
.half.top .inn{transform:rotate(180deg);display:flex;flex-direction:column;
  align-items:center;gap:clamp(10px,2vh,14px)}
.plbl{font-size:clamp(9px,2vw,11px);font-weight:500;letter-spacing:.25em;
  text-transform:uppercase;opacity:.5}
.td{font-family:'DM Mono',monospace;font-size:clamp(44px,16vmin,100px);
  font-weight:300;letter-spacing:-.02em;line-height:1;transition:color .2s,transform .15s}
.td.pulse{animation:tp .08s ease}
@keyframes tp{0%{transform:scale(1)}50%{transform:scale(.96)}100%{transform:scale(1)}}
.sinfo{font-family:'DM Mono',monospace;font-size:clamp(11px,2.5vw,13px);
  letter-spacing:.05em;opacity:.55;display:flex;align-items:center;gap:8px;
  min-height:18px;flex-wrap:wrap;justify-content:center}
.bdot{width:6px;height:6px;border-radius:50%;background:currentColor;
  opacity:.4;transition:opacity .2s,transform .2s;flex-shrink:0}
.bdot.used{opacity:.12}
.bdot.cur{opacity:1;transform:scale(1.4);animation:bp 1s ease-in-out infinite}
@keyframes bp{0%,100%{transform:scale(1.4)}50%{transform:scale(1)}}
.bprog{height:3px;background:rgba(245,240,232,.1);width:min(80%,200px);
  border-radius:2px;overflow:hidden}
.half.act .bprog{background:rgba(0,0,0,.1)}
.bfill{height:100%;background:currentColor;transition:width .9s linear;border-radius:2px}
.tapbox{display:flex;align-items:center;gap:8px;pointer-events:none;
  flex-wrap:wrap;justify-content:center}
.tapb{background:rgba(245,240,232,.1);border:1px solid rgba(245,240,232,.18);
  border-radius:100px;padding:7px 16px;font-size:clamp(9px,2.2vw,11px);
  font-weight:500;letter-spacing:.18em;text-transform:uppercase;
  color:currentColor;animation:tf 1.8s ease-in-out infinite}
.tapb.s2{font-size:clamp(8px,2vw,10px);background:rgba(245,240,232,.05);
  border-color:rgba(245,240,232,.1);animation-delay:.35s}
@keyframes tf{0%,100%{opacity:.3;transform:translateY(2px)}50%{opacity:.85;transform:translateY(0)}}

/* controls bar */
.cbar{height:var(--bh);background:var(--bg);display:flex;align-items:center;
  justify-content:center;gap:clamp(8px,3vw,16px);z-index:20;flex-shrink:0;
  border-top:1px solid rgba(245,240,232,.06);border-bottom:1px solid rgba(245,240,232,.06);
  position:relative;padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
.logo{position:absolute;left:max(16px,env(safe-area-inset-left,16px));
  font-family:'Playfair Display',serif;font-size:12px;font-weight:700;
  letter-spacing:.08em;color:rgba(245,240,232,.2);text-transform:uppercase}
@media(max-width:360px){.logo{display:none}}
.mvctr{position:absolute;right:max(68px,calc(env(safe-area-inset-right,0px) + 68px));
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;
  color:rgba(245,240,232,.3);text-transform:uppercase;white-space:nowrap}
.mvctr span{color:rgba(245,240,232,.6);font-weight:500}
.cb{background:rgba(245,240,232,.06);border:1px solid rgba(245,240,232,.1);
  color:var(--fg);font-family:'DM Sans',sans-serif;
  font-size:clamp(11px,2.5vw,12px);font-weight:500;letter-spacing:.1em;
  text-transform:uppercase;min-height:44px;padding:0 clamp(14px,4vw,22px);
  border-radius:100px;cursor:pointer;
  transition:background .2s,border-color .2s,transform .15s;
  white-space:nowrap;-webkit-appearance:none;appearance:none}
.cb:active{transform:scale(.94);background:rgba(245,240,232,.1)}
.cb.dr{color:var(--red);border-color:rgba(224,90,78,.3)}
.cb.dr:active{background:rgba(224,90,78,.12)}
.cb.ac{color:var(--acc);border-color:rgba(200,169,110,.3)}
.cb.ac:active{background:rgba(200,169,110,.12)}
.sibtn{position:absolute;right:max(16px,env(safe-area-inset-right,16px));
  background:none;border:1px solid rgba(245,240,232,.1);color:rgba(245,240,232,.5);
  width:44px;height:44px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
  font-size:17px;-webkit-appearance:none;appearance:none}
.sibtn:active{color:var(--fg);background:rgba(245,240,232,.1)}

/* remote strip */
.rbar{display:none;align-items:center;justify-content:center;gap:8px;
  background:#111;border-bottom:1px solid rgba(245,240,232,.06);
  padding:6px 16px;flex-shrink:0;font-family:'DM Mono',monospace;
  font-size:11px;color:rgba(245,240,232,.4)}
.rbar.on{display:flex}
.rbadge{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;
  padding:3px 9px;border-radius:100px;flex-shrink:0}
.rbadge.h{background:rgba(200,169,110,.15);color:var(--acc);border:1px solid rgba(200,169,110,.3)}
.rbadge.b{background:rgba(20,20,20,.9);color:rgba(245,240,232,.7);border:1px solid rgba(245,240,232,.2)}
.rbadge.w{background:rgba(245,240,232,.12);color:var(--fg);border:1px solid rgba(245,240,232,.3)}
.rbadge.v{background:rgba(100,100,200,.12);color:#aab;border:1px solid rgba(100,100,200,.25)}
.rcode{font-size:13px;font-weight:500;color:var(--fg);letter-spacing:.15em;flex:1}
.rname{font-size:10px;opacity:.45;max-width:80px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.rsb{background:none;border:1px solid rgba(245,240,232,.12);
  color:rgba(245,240,232,.5);font-family:'DM Sans',sans-serif;
  font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  padding:4px 10px;border-radius:100px;cursor:pointer;
  -webkit-appearance:none;appearance:none;transition:all .2s;white-space:nowrap}
.rsb:active{background:rgba(245,240,232,.1);color:var(--fg)}
.rsb.rd{border-color:rgba(224,90,78,.3);color:rgba(224,90,78,.6)}
.rsb.rd:active{background:rgba(224,90,78,.12);color:var(--red)}

@media(max-height:500px) and (orientation:landscape){
  :root{--bh:52px}
  .cb{min-height:36px;font-size:10px;padding:0 12px}
  .sibtn{width:36px;height:36px;font-size:14px}
  .td{font-size:clamp(32px,12vmin,64px)}
  .sinfo{font-size:10px}.plbl{font-size:9px}
  .tapb{padding:5px 10px;font-size:9px}
  .logo,.mvctr{display:none}
}
.rip{position:absolute;border-radius:50%;background:rgba(255,255,255,.18);
  transform:scale(0);animation:ra .5s ease-out forwards;pointer-events:none;z-index:5}
@keyframes ra{to{transform:scale(4);opacity:0}}

/* expired */
.expov{position:fixed;inset:0;background:var(--red);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;
  transition:opacity .4s;gap:12px;padding:24px;
  padding-bottom:max(24px,env(safe-area-inset-bottom))}
.expov.on{opacity:1;pointer-events:all}
.exptit{font-family:'Playfair Display',serif;font-size:clamp(28px,10vw,72px);
  font-weight:900;color:white;letter-spacing:-.02em;text-align:center}
.expsub{font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(255,255,255,.55);text-align:center}
.expbtn{margin-top:16px;background:white;color:var(--red);border:none;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;padding:16px 36px;
  border-radius:100px;cursor:pointer;min-height:52px;transition:transform .2s;
  -webkit-appearance:none;appearance:none}
.expbtn:active{transform:scale(.97)}

/* toast */
.toast{position:fixed;bottom:max(24px,env(safe-area-inset-bottom,24px));left:50%;
  transform:translateX(-50%) translateY(80px);background:var(--fg);color:var(--bg);
  font-size:13px;font-weight:500;padding:12px 24px;border-radius:100px;z-index:600;
  transition:transform .4s var(--ease);white-space:nowrap;max-width:calc(100vw - 40px)}
.toast.on{transform:translateX(-50%) translateY(0)}

/* settings page */
#sp{background:var(--bg);overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.shdr{padding:max(48px,env(safe-area-inset-top,48px)) 20px 24px;
  border-bottom:1px solid rgba(245,240,232,.08);position:sticky;top:0;
  background:var(--bg);z-index:10;display:flex;align-items:flex-end;
  justify-content:space-between;gap:12px}
.stit{font-family:'Playfair Display',serif;font-size:clamp(22px,6vw,38px);
  font-weight:900;letter-spacing:-.02em}
.ssub{font-size:10px;letter-spacing:.2em;text-transform:uppercase;opacity:.3;margin-top:4px}
.backbtn{background:none;border:1px solid rgba(245,240,232,.15);color:var(--fg);
  font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:.1em;
  text-transform:uppercase;padding:0 18px;border-radius:100px;cursor:pointer;
  transition:background .2s;flex-shrink:0;min-height:44px;display:flex;
  align-items:center;-webkit-appearance:none;appearance:none}
.backbtn:active{background:rgba(245,240,232,.08)}
.sbody{padding:24px 20px max(60px,env(safe-area-inset-bottom,60px));
  max-width:600px;margin:0 auto}
.sl{font-size:10px;letter-spacing:.25em;text-transform:uppercase;
  opacity:.3;margin-bottom:12px;margin-top:32px;font-weight:500}
.sl:first-child{margin-top:0}

/* layout picker */
.laytog{display:flex;gap:10px}
.layopt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;background:rgba(245,240,232,.04);border:1px solid rgba(245,240,232,.1);
  border-radius:14px;padding:16px 12px;cursor:pointer;min-height:76px;
  color:var(--fg);font-family:'DM Sans',sans-serif;font-size:11px;
  letter-spacing:.1em;text-transform:uppercase;opacity:.45;transition:all .2s;
  -webkit-appearance:none;appearance:none}
.layopt:active{background:rgba(245,240,232,.1)}
.layopt.sel{background:rgba(200,169,110,.1);border-color:var(--acc);color:var(--acc);opacity:1}
.layico{font-size:20px;line-height:1}

/* remote collapsible */
.rtogbtn{width:100%;display:flex;align-items:center;justify-content:space-between;
  background:rgba(245,240,232,.04);border:1px solid rgba(245,240,232,.1);
  border-radius:14px;padding:14px 18px;cursor:pointer;transition:all .2s;
  min-height:52px;color:var(--fg);font-family:'DM Sans',sans-serif;
  -webkit-appearance:none;appearance:none;text-align:left}
.rtogbtn:active{background:rgba(245,240,232,.08)}
.rtogbtn.open{border-color:rgba(100,180,200,.4);background:rgba(100,180,200,.06);
  border-radius:14px 14px 0 0}
.rtleft{display:flex;align-items:center;gap:10px}
.rtlbl{font-size:13px;font-weight:500}
.rtsub{font-size:11px;opacity:.35;font-family:'DM Mono',monospace;margin-top:2px}
.rtarr{font-size:11px;opacity:.4;transition:transform .3s var(--ease);flex-shrink:0}
.rtogbtn.open .rtarr{transform:rotate(180deg)}
.rcoll{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}
.rcoll.open{max-height:900px}
.rin{background:rgba(100,180,200,.04);border:1px solid rgba(100,180,200,.14);
  border-top:none;border-radius:0 0 14px 14px;padding:16px;
  display:flex;flex-direction:column;gap:12px}

/* remote panels */
.rpanels{display:flex;gap:10px}
.rpanel{flex:1;background:rgba(245,240,232,.04);border:1px solid rgba(245,240,232,.1);
  border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px}
.rptit{font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;opacity:.5}
.rpdesc{font-size:11px;font-family:'DM Mono',monospace;opacity:.3;line-height:1.5}
.rpbtn{background:rgba(200,169,110,.1);border:1px solid rgba(200,169,110,.3);
  color:var(--acc);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  letter-spacing:.08em;text-transform:uppercase;padding:0 14px;border-radius:100px;
  cursor:pointer;min-height:40px;transition:all .2s;
  -webkit-appearance:none;appearance:none;white-space:nowrap}
.rpbtn:active{background:rgba(200,169,110,.2)}
.rpbtn.gy{background:rgba(245,240,232,.06);border-color:rgba(245,240,232,.12);color:var(--fg)}
.rpbtn.gy:active{background:rgba(245,240,232,.14)}
.rpbtn.rd{background:rgba(224,90,78,.08);border-color:rgba(224,90,78,.25);color:var(--red)}
.rpbtn.rd:active{background:rgba(224,90,78,.18)}
.rcodein{width:100%;background:rgba(245,240,232,.07);
  border:1px solid rgba(245,240,232,.12);color:var(--fg);
  font-family:'DM Mono',monospace;font-size:max(16px,1em);font-weight:500;
  letter-spacing:.2em;text-align:center;text-transform:uppercase;padding:0 12px;
  border-radius:12px;outline:none;min-height:44px;transition:border-color .2s;
  -webkit-appearance:none;appearance:none}
.rcodein:focus{border-color:var(--acc)}

/* room active */
.rcoderow{display:flex;align-items:center;gap:8px;background:rgba(200,169,110,.07);
  border:1px solid rgba(200,169,110,.2);border-radius:12px;padding:10px 14px}
.rcodebig{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;
  letter-spacing:.22em;color:var(--acc);flex:1}
.rpill{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  padding:4px 10px;border-radius:100px;flex-shrink:0}
.rpill.h{background:rgba(200,169,110,.2);color:var(--acc);border:1px solid rgba(200,169,110,.4)}
.rpill.b{background:rgba(20,20,20,.9);color:rgba(245,240,232,.8);border:1px solid rgba(245,240,232,.25)}
.rpill.w{background:rgba(245,240,232,.15);color:var(--fg);border:1px solid rgba(245,240,232,.3)}
.rpill.v{background:rgba(120,140,200,.12);color:#aac;border:1px solid rgba(120,140,200,.25)}
.rbtns{display:flex;gap:8px;flex-wrap:wrap}
.rinfo{font-size:11px;font-family:'DM Mono',monospace;opacity:.32;line-height:1.6}
.mlbl{font-size:10px;letter-spacing:.15em;text-transform:uppercase;opacity:.3;margin-bottom:8px}
.mrow{display:flex;align-items:center;gap:8px;background:rgba(245,240,232,.04);
  border:1px solid rgba(245,240,232,.07);border-radius:10px;padding:10px 12px;margin-bottom:5px}
.mname{flex:1;font-size:12px;font-family:'DM Mono',monospace;opacity:.7;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.monl{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--grn);flex-shrink:0}
.maway{font-size:9px;letter-spacing:.1em;text-transform:uppercase;opacity:.3;flex-shrink:0}
.rpick{display:flex;gap:4px}
.rolebtn{background:rgba(245,240,232,.06);border:1px solid rgba(245,240,232,.1);
  color:rgba(245,240,232,.45);font-family:'DM Sans',sans-serif;font-size:9px;
  font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:4px 8px;
  border-radius:100px;cursor:pointer;-webkit-appearance:none;appearance:none;transition:all .2s}
.rolebtn.sb{background:rgba(20,20,20,.9);border-color:rgba(245,240,232,.3);color:var(--fg)}
.rolebtn.sw{background:rgba(245,240,232,.15);border-color:rgba(245,240,232,.4);color:var(--fg)}
.rolebtn.sv{background:rgba(120,140,200,.15);border-color:rgba(120,140,200,.35);color:#aac}

/* dropdown */
.cswrap{position:relative}
.cstrig{display:flex;align-items:center;justify-content:space-between;
  background:rgba(245,240,232,.05);border:1px solid rgba(245,240,232,.12);
  border-radius:14px;padding:16px 18px;cursor:pointer;transition:all .2s;
  gap:12px;min-height:60px}
.cstrig:active{background:rgba(245,240,232,.08)}
.cstrig.open{border-color:var(--acc);background:rgba(200,169,110,.07);
  border-radius:14px 14px 0 0;border-bottom-color:transparent}
.csl{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
.csv{font-size:clamp(13px,3.5vw,15px);font-weight:500;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.csd{font-size:clamp(10px,2.5vw,11px);opacity:.4;font-family:'DM Mono',monospace;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.csar{width:28px;height:28px;border-radius:50%;border:1px solid rgba(245,240,232,.12);
  display:flex;align-items:center;justify-content:center;font-size:11px;opacity:.5;
  flex-shrink:0;transition:transform .3s var(--ease),opacity .2s}
.cstrig.open .csar{transform:rotate(180deg);opacity:.8}
.cspan{position:absolute;left:0;right:0;top:100%;z-index:50;background:#131313;
  border:1px solid rgba(200,169,110,.3);border-top:none;border-radius:0 0 14px 14px;
  overflow:hidden;max-height:0;transition:max-height .38s cubic-bezier(.4,0,.2,1),opacity .25s;
  opacity:0;pointer-events:none}
.cspan.open{max-height:440px;opacity:1;pointer-events:all}
.csopt{display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer;
  transition:background .15s;border-bottom:1px solid rgba(245,240,232,.04);min-height:60px}
.csopt:last-child{border-bottom:none}
.csopt:active{background:rgba(245,240,232,.06)}
.csopt.sel{background:rgba(200,169,110,.07)}
.csico{width:38px;height:38px;border-radius:10px;flex-shrink:0;display:flex;
  align-items:center;justify-content:center;font-size:17px;
  background:rgba(245,240,232,.05);border:1px solid rgba(245,240,232,.07)}
.csopt.sel .csico{background:rgba(200,169,110,.14);border-color:rgba(200,169,110,.28)}
.cstxt{flex:1;min-width:0}
.csnm{font-size:clamp(13px,3.5vw,14px);font-weight:500}
.csht{font-size:clamp(10px,2.5vw,11px);opacity:.37;font-family:'DM Mono',monospace;margin-top:2px}
.csopt.sel .csnm{color:var(--acc)}
.csck{font-size:13px;color:var(--acc);opacity:0;transition:opacity .2s;flex-shrink:0}
.csopt.sel .csck{opacity:1}

/* time inputs */
.trow{display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px 0;border-bottom:1px solid rgba(245,240,232,.06);flex-wrap:nowrap}
.trlhs{flex:1;min-width:0}
.trlbl{font-size:clamp(13px,3.5vw,14px);font-weight:400;opacity:.85}
.trsub{font-size:clamp(10px,2.5vw,11px);opacity:.32;margin-top:2px;
  font-family:'DM Mono',monospace;line-height:1.4}
.tig{display:flex;align-items:center;gap:6px;flex-shrink:0}
.tin,.cin{background:rgba(245,240,232,.07);border:1px solid rgba(245,240,232,.12);
  color:var(--fg);font-family:'DM Mono',monospace;font-size:max(16px,1em);
  font-weight:300;width:56px;min-height:48px;text-align:center;padding:0 4px;
  border-radius:12px;outline:none;transition:border-color .2s,background .2s;
  -moz-appearance:textfield;-webkit-appearance:none;appearance:none}
.tin::-webkit-inner-spin-button,.tin::-webkit-outer-spin-button,
.cin::-webkit-inner-spin-button,.cin::-webkit-outer-spin-button{-webkit-appearance:none}
.tin:focus,.cin:focus{border-color:var(--acc);background:rgba(200,169,110,.08)}
.tcol{opacity:.28;font-family:'DM Mono',monospace;font-size:18px;flex-shrink:0}
.tunit{margin-left:6px;font-size:11px;opacity:.3;white-space:nowrap;flex-shrink:0}

/* rules */
.rulebox{background:rgba(200,169,110,.05);border:1px solid rgba(200,169,110,.13);
  border-radius:14px;padding:16px 18px;margin-top:12px}
.rulebox p{font-size:clamp(12px,3vw,13px);line-height:1.75;opacity:.6}
.rulebox strong{color:var(--acc);font-weight:500}

/* presets */
.pgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
@media(min-width:480px){.pgrid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}}
.pcard{background:rgba(245,240,232,.04);border:1px solid rgba(245,240,232,.08);
  border-radius:14px;padding:14px;cursor:pointer;transition:background .2s,border-color .2s;
  position:relative;overflow:hidden;min-height:76px}
.pcard:active{background:rgba(245,240,232,.08)}
.pcard.sel{background:rgba(200,169,110,.1);border-color:var(--acc)}
.pnm{font-size:clamp(12px,3vw,13px);font-weight:500;margin-bottom:3px}
.psy{font-size:9px;opacity:.38;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.pde{font-family:'DM Mono',monospace;font-size:10px;opacity:.38;line-height:1.5}
.pdel{position:absolute;top:6px;right:6px;background:rgba(224,90,78,.08);border:none;
  color:rgba(224,90,78,.5);cursor:pointer;font-size:11px;width:24px;height:24px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  transition:background .2s,color .2s;opacity:0;pointer-events:none}
@media(hover:none){.pdel{opacity:1;pointer-events:auto}}
@media(hover:hover){.pcard:hover .pdel{opacity:1;pointer-events:auto}}
.pdel:active{background:rgba(224,90,78,.2);color:var(--red)}
.addpbtn{background:rgba(245,240,232,.03);border:1px dashed rgba(245,240,232,.13);
  border-radius:14px;padding:16px;cursor:pointer;transition:all .2s;
  color:rgba(245,240,232,.35);font-size:13px;display:flex;align-items:center;
  justify-content:center;gap:8px;font-family:'DM Sans',sans-serif;
  width:100%;min-height:52px;-webkit-appearance:none;appearance:none}
.addpbtn:active{color:var(--fg);background:rgba(245,240,232,.06)}

/* play bar */
.plbar{display:flex;gap:10px;margin-top:28px;padding-top:24px;
  border-top:1px solid rgba(245,240,232,.08)}
.playbtn{flex:1;background:var(--fg);color:var(--bg);border:none;
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;padding:0 26px;
  border-radius:100px;cursor:pointer;transition:all .2s;min-height:52px;
  -webkit-appearance:none;appearance:none}
.playbtn:active{transform:scale(.97);background:#ddd8d0}

/* modal */
.mback{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:400;
  display:flex;align-items:center;justify-content:center;padding:24px;
  opacity:0;pointer-events:none;transition:opacity .25s;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.mback.on{opacity:1;pointer-events:all}
.mbox{background:#1c1c1c;border:1px solid rgba(245,240,232,.12);border-radius:22px;
  padding:28px 24px 22px;width:100%;max-width:380px;
  transform:scale(.93) translateY(10px);transition:transform .3s var(--ease)}
.mback.on .mbox{transform:scale(1) translateY(0)}
.mtit{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;margin-bottom:5px}
.msub{font-size:12px;opacity:.38;font-family:'DM Mono',monospace;margin-bottom:20px;line-height:1.5}
.minp{width:100%;background:rgba(245,240,232,.07);border:1px solid rgba(245,240,232,.15);
  color:var(--fg);font-family:'DM Sans',sans-serif;font-size:max(16px,1em);
  padding:14px 16px;border-radius:12px;outline:none;
  transition:border-color .2s,background .2s;-webkit-appearance:none;appearance:none}
.minp:focus{border-color:var(--acc);background:rgba(200,169,110,.06)}
.macts{display:flex;gap:10px;margin-top:16px}
.mcan{flex:1;background:rgba(245,240,232,.06);border:1px solid rgba(245,240,232,.1);
  color:var(--fg);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  letter-spacing:.08em;text-transform:uppercase;padding:0 16px;border-radius:100px;
  cursor:pointer;min-height:48px;transition:background .2s;
  -webkit-appearance:none;appearance:none}
.mcan:active{background:rgba(245,240,232,.12)}
.mok{flex:2;background:var(--acc);color:var(--bg);border:none;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;padding:0 16px;
  border-radius:100px;cursor:pointer;min-height:48px;transition:all .2s;
  -webkit-appearance:none;appearance:none}
.mok:active{transform:scale(.97)}
.mok.danger{background:var(--red);color:white}
</style>
</head>
<body>

<!-- CLOCK PAGE -->
<div id="cp" class="page">
  <div class="half top off" id="h1" tabindex="0">
    <div class="inn">
      <div class="plbl">Black</div>
      <div class="td" id="t1">3:00</div>
      <div class="sinfo">
        <div class="bdot" id="d1-0"></div><div class="bdot" id="d1-1"></div>
        <div class="bdot" id="d1-2"></div><div class="bdot" id="d1-3"></div>
        <div class="bdot" id="d1-4"></div>
        <span id="s1" style="margin-left:4px"></span>
      </div>
      <div class="bprog" id="pr1" style="display:none"><div class="bfill" id="pf1"></div></div>
      <div class="tapbox" id="th1">
        <div class="tapb">Tap to Begin</div>
        <div class="tapb s2" id="tl1">Byo-Yomi</div>
      </div>
    </div>
  </div>

  <div class="cbar">
    <span class="logo">Go Clock</span>
    <button class="cb dr" id="btnR">Reset</button>
    <button class="cb ac" id="btnP">Pause</button>
    <div class="mvctr" id="mvc" style="display:none">Move <span id="mvn">0</span></div>
    <button class="sibtn" id="btnS">⚙</button>
  </div>

  <div class="rbar" id="rbar">
    <span class="rbadge h" id="rbg">Host</span>
    <span class="rcode" id="rcd">——</span>
    <span class="rname" id="rnm"></span>
    <button class="rsb" id="rsoBtn">Step Out</button>

  </div>

  <div class="half bot off" id="h2" tabindex="0">
    <div class="plbl">White</div>
    <div class="td" id="t2">3:00</div>
    <div class="sinfo">
      <div class="bdot" id="d2-0"></div><div class="bdot" id="d2-1"></div>
      <div class="bdot" id="d2-2"></div><div class="bdot" id="d2-3"></div>
      <div class="bdot" id="d2-4"></div>
      <span id="s2" style="margin-left:4px"></span>
    </div>
    <div class="bprog" id="pr2" style="display:none"><div class="bfill" id="pf2"></div></div>
    <div class="tapbox" id="th2">
      <div class="tapb">Tap to Begin</div>
      <div class="tapb s2" id="tl2">Byo-Yomi</div>
    </div>

</div>

<!-- SETTINGS PAGE -->
<div id="sp" class="page hidden">
  <div class="shdr">
    <div>
      <div class="stit">Settings</div>
      <div class="ssub" id="ssub">Japanese Byo-Yomi</div>
    </div>
    <button class="backbtn" id="btnBk">← Back</button>
  </div>
  <div class="sbody">
    <div class="sl">Saved Presets</div>
    <div class="pgrid" id="pgrid"></div>
    <button class="addpbtn" id="btnAP">+ Save Current as Preset</button>

    <div class="sl">Layout</div>
    <div class="laytog">
      <button class="layopt sel" id="lStk"><div class="layico">⬛<br>⬜</div>Stacked</button>
      <button class="layopt" id="lSbs"><div class="layico">⬛ ⬜</div>Side by Side</button>
    </div>

    <div class="sl">Remote Play</div>
    <button class="rtogbtn" id="rtogBtn">
      <div class="rtleft">
        <span style="font-size:16px">📡</span>
        <div><div class="rtlbl">Play Across Devices</div><div class="rtsub" id="rtsub">Host or join a live room</div></div>
      </div>
      <span class="rtarr">▾</span>
    </button>
    <div class="rcoll" id="rcoll"><div class="rin" id="rin"></div></div>

    <div class="sl">Time System</div>
    <div class="cswrap" id="cswrap">
      <div class="cstrig" id="cstrig">
        <div class="csl">
          <div class="csv" id="csv">Japanese Byo-Yomi</div>
          <div class="csd" id="csd">Main time + timed periods per move</div>
        </div>
        <div class="csar">▾</div>
      </div>
      <div class="cspan" id="cspan"></div>

    <div id="tfields"></div>
    <div class="sl">Rules</div>
    <div class="rulebox"><p id="rtxt"></p></div>
    <div class="plbar"><button class="playbtn" id="btnPl">▶ Play</button></div>
  </div>
</div>

<!-- EXPIRED -->
<div class="expov" id="expov">
  <div class="expsub">Time has run out</div>
  <div class="exptit" id="expwho">Black loses on time</div>
  <button class="expbtn" id="btnER">Reset &amp; Play Again</button>
</div>

<!-- MODAL -->
<div class="mback" id="mback">
  <div class="mbox">
    <div class="mtit" id="mtit"></div>
    <div class="msub" id="msub"></div>
    <input class="minp" id="minp" type="text" autocomplete="off" maxlength="40">
    <div class="macts">
      <button class="mcan" id="mcan">Cancel</button>
      <button class="mok" id="mok">OK</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
// TIME SYSTEMS
// ─────────────────────────────────────────────
var SYS = {
  japanese:{id:'japanese',name:'Japanese Byo-Yomi',icon:'🎌',sd:'Main time + timed periods per move',
    def:{mainTime:180,byoTime:30,byoCount:5},
    fields:[{id:'mainTime',lbl:'Main Time',sub:'Total thinking time before byo-yomi',t:'mm'},{id:'byoTime',lbl:'Period Duration',sub:'Time limit per byo-yomi period',t:'mm'},{id:'byoCount',lbl:'Periods',sub:'Number of byo-yomi periods per player',t:'ct',unit:'periods'}],
    rules:'<strong>Japanese Byo-Yomi</strong> — Main thinking time, then timed periods. <strong>Each move must finish within one period.</strong> Run out of periods and you lose.',tl:'Byo-Yomi'},
  sudden:{id:'sudden',name:'Sudden Death',icon:'☠️',sd:'One fixed clock — no overtime',
    def:{mainTime:300},fields:[{id:'mainTime',lbl:'Total Time',sub:'All time each player has',t:'mm'}],
    rules:'<strong>Sudden Death</strong> — One block of time. <strong>Run out and you lose immediately.</strong>',tl:'Sudden Death'},
  canadian:{id:'canadian',name:'Canadian Byo-Yomi',icon:'🍁',sd:'Main time + moves-per-period overtime',
    def:{mainTime:180,byoTime:60,movesPerPeriod:10},
    fields:[{id:'mainTime',lbl:'Main Time',sub:'Before byo-yomi',t:'mm'},{id:'byoTime',lbl:'Period Duration',sub:'Time for required moves',t:'mm'},{id:'movesPerPeriod',lbl:'Moves per Period',sub:'Moves required each period',t:'ct',unit:'moves'}],
    rules:'<strong>Canadian Byo-Yomi</strong> — Complete a set number of moves within each period.',tl:'Canadian'},
  fischer:{id:'fischer',name:'Fischer Increment',icon:'⏱',sd:'Seconds added after every move',
    def:{mainTime:180,increment:10},
    fields:[{id:'mainTime',lbl:'Starting Time',sub:'Starting clock',t:'mm'},{id:'increment',lbl:'Increment',sub:'Seconds added after every move',t:'ct',unit:'sec/move'}],
    rules:'<strong>Fischer Increment</strong> — Time added after each move.',tl:'Fischer'},
  simple:{id:'simple',name:'Simple (Per Move)',icon:'⏳',sd:'Fixed time per move, resets each turn',
    def:{moveTime:30},fields:[{id:'moveTime',lbl:'Time per Move',sub:'Resets every turn',t:'mm'}],
    rules:'<strong>Simple</strong> — Fixed clock reset every turn.',tl:'Per Move'}
};
var SORD=['japanese','sudden','canadian','fischer','simple'];
var DEFS={system:'japanese',mainTime:180,byoTime:30,byoCount:5,movesPerPeriod:10,increment:10,moveTime:30};

// ─────────────────────────────────────────────
// STORAGE
// ─────────────────────────────────────────────
function ls(k){try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}}
function lss(k,v){localStorage.setItem(k,JSON.stringify(v))}
function loadSettings(){var s=ls('gc_s');return(s&&s.system)?Object.assign({},DEFS,s):Object.assign({},DEFS)}
function saveSettings(s){lss('gc_s',s);cfg=s}
function loadPresets(){var p=ls('gc_p');return(Array.isArray(p)&&p.length)?p:[]}
function savePresets(p){lss('gc_p',p);presets=p}
function loadLayout(){return localStorage.getItem('gc_l')||'stacked'}
function saveLayout(l){localStorage.setItem('gc_l',l)}
function getMyId(){var id=localStorage.getItem('gc_uid');if(!id){id='u'+Math.random().toString(36).slice(2,10);localStorage.setItem('gc_uid',id)}return id}

var cfg=loadSettings(), presets=loadPresets();

// ─────────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────────
var gs={phase:'idle',active:null,p1:null,p2:null,iv:null,moves:0};

function mkP(){
  var s=cfg,sys=s.system;
  if(sys==='japanese')return{main:s.mainTime,byoLeft:s.byoTime,byoCount:s.byoCount,byoTotal:s.byoTime,inByo:s.mainTime===0};
  if(sys==='sudden')return{main:s.mainTime};
  if(sys==='canadian')return{main:s.mainTime,byoLeft:s.byoTime,byoTotal:s.byoTime,movInPer:0,movReq:s.movesPerPeriod,inByo:s.mainTime===0};
  if(sys==='fischer')return{main:s.mainTime,inc:s.increment};
  if(sys==='simple')return{main:s.moveTime,movTot:s.moveTime};
}
function initP(){gs.p1=mkP();gs.p2=mkP();gs.moves=0;updMVC()}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function fmt(secs){var neg=secs<0;secs=Math.abs(Math.floor(secs));var m=Math.floor(secs/60),s=secs%60;return(neg?'-':'')+(m>0?m+':'+String(s).padStart(2,'0'):String(s))}
function gel(id){return document.getElementById(id)}

function updMVC(){
  var el=gel('mvc');
  if(gs.phase==='idle'||gs.phase==='expired'){el.style.display='none';return}
  el.style.display='';gel('mvn').textContent=gs.moves;
}

function updDisplay(pid){
  var p=pid===1?gs.p1:gs.p2, sys=cfg.system;
  var tEl=gel('t'+pid),sEl=gel('s'+pid),pEl=gel('pr'+pid),fEl=gel('pf'+pid);
  for(var i=0;i<5;i++)gel('d'+pid+'-'+i).style.display='none';
  pEl.style.display='none';
  if(sys==='japanese'){
    if(!p.inByo){tEl.textContent=fmt(p.main);sEl.textContent='× '+p.byoCount+' byo-yomi';dots(pid,p.byoCount,cfg.byoCount,false)}
    else{tEl.textContent=fmt(p.byoLeft);sEl.textContent=p.byoCount>1?p.byoCount+' periods left':'Last period!';dots(pid,p.byoCount,cfg.byoCount,true);pEl.style.display='block';fEl.style.width=Math.max(0,(p.byoLeft/p.byoTotal)*100)+'%'}
  }else if(sys==='sudden'){tEl.textContent=fmt(p.main);sEl.textContent='Sudden death'}
  else if(sys==='canadian'){
    if(!p.inByo){tEl.textContent=fmt(p.main);sEl.textContent=cfg.movesPerPeriod+' moves / period'}
    else{tEl.textContent=fmt(p.byoLeft);var mv=p.movReq-p.movInPer;sEl.textContent=mv+' move'+(mv!==1?'s':'')+' left';pEl.style.display='block';fEl.style.width=Math.max(0,(p.byoLeft/p.byoTotal)*100)+'%'}
  }else if(sys==='fischer'){tEl.textContent=fmt(p.main);sEl.textContent='+'+p.inc+'s / move'}
  else if(sys==='simple'){tEl.textContent=fmt(p.main);sEl.textContent='per move';pEl.style.display='block';fEl.style.width=Math.max(0,(p.main/p.movTot)*100)+'%'}
}

function dots(pid,rem,tot,inByo){
  var show=Math.min(tot,5);
  for(var i=0;i<5;i++){
    var d=gel('d'+pid+'-'+i);
    if(i>=show){d.style.display='none';continue}
    d.style.display='';d.className='bdot';
    if(rem<=i)d.classList.add('used');
    else if(inByo&&i===rem-1)d.classList.add('cur');
  }
}

function updHalves(){
  var h1=gel('h1'),h2=gel('h2'),th1=gel('th1'),th2=gel('th2');
  h1.className='half top'; h2.className='half bot';
  if(gs.phase==='idle'){h1.classList.add('off');h2.classList.add('off');th1.style.display='flex';th2.style.display='flex'}
  else{
    th1.style.display='none';th2.style.display='none';
    if(gs.active===1){h1.classList.add('act');h2.classList.add('off')}
    else if(gs.active===2){h2.classList.add('act');h1.classList.add('off')}
    else{h1.classList.add('off');h2.classList.add('off')}
    if(RS&&!RS.so){
      var r=RS.mr;
      if(r==='black')h2.classList.add('lk');
      else if(r==='white')h1.classList.add('lk');
      else if(r==='viewer'){h1.classList.add('lk');h2.classList.add('lk')}
    }
  }
}

// ─────────────────────────────────────────────
// LAYOUT
// ─────────────────────────────────────────────
var curLayout=loadLayout();
function applyLayout(l){
  curLayout=l;
  gel('cp').classList.toggle('sbs',l==='side');
  gel('lStk').classList.toggle('sel',l==='stacked');
  gel('lSbs').classList.toggle('sel',l==='side');
}
function setLayout(l){applyLayout(l);saveLayout(l)}

// ─────────────────────────────────────────────
// AUDIO
// ─────────────────────────────────────────────
var actx;
function getActx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function playPop(){
  try{var c=getActx(),n=c.currentTime;
    [[800,200,.3,.08,'square'],[1200,600,.15,.05,'sine']].forEach(function(a){
      var o=c.createOscillator(),g=c.createGain();o.type=a[4];
      o.frequency.setValueAtTime(a[0],n);o.frequency.exponentialRampToValueAtTime(a[1],n+a[3]);
      g.gain.setValueAtTime(a[2],n);g.gain.exponentialRampToValueAtTime(.001,n+a[3]);
      o.connect(g);g.connect(c.destination);o.start(n);o.stop(n+a[3]);
    });
  }catch(e){}
}
function playBeep(u){
  try{var c=getActx(),n=c.currentTime,f=520+u*400,d=.18-u*.09,atk=.012,rel=d*.55;
    var o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(f,n);
    g.gain.setValueAtTime(0,n);g.gain.linearRampToValueAtTime(.28,n+atk);
    g.gain.setValueAtTime(.28,n+d-rel);g.gain.exponentialRampToValueAtTime(.0001,n+d);
    o.connect(g);g.connect(c.destination);o.start(n);o.stop(n+d+.02);
  }catch(e){}
}
function setDanger(pid,on){gel('h'+pid).classList.toggle('dp',on)}

// ─────────────────────────────────────────────
// TICK
// ─────────────────────────────────────────────
function byoTh(){return cfg.byoTime<=10?5:10}
function tick(){
  var pid=gs.active,p=pid===1?gs.p1:gs.p2,sys=cfg.system;
  if(sys==='japanese'){
    if(!p.inByo){p.main-=1;if(p.main<=0){p.main=0;p.inByo=true;setDanger(pid,false)}else if(p.main<=10){playBeep(1-p.main/10);setDanger(pid,true);pulseT(pid)}else setDanger(pid,false)}
    if(p.inByo){p.byoLeft-=1;if(p.byoLeft<=0){p.byoCount-=1;if(p.byoCount<=0){setDanger(pid,false);expire();return}p.byoLeft=p.byoTotal;setDanger(pid,false)}var th=byoTh();if(p.byoLeft>0&&p.byoLeft<=th){playBeep(1-p.byoLeft/th);setDanger(pid,true);pulseT(pid)}else if(p.byoLeft>th)setDanger(pid,false)}
  }else if(sys==='sudden'){p.main-=1;if(p.main<=0){setDanger(pid,false);expire();return}if(p.main<=10){playBeep(1-p.main/10);setDanger(pid,true);pulseT(pid)}else setDanger(pid,false)}
  else if(sys==='canadian'){
    if(!p.inByo){p.main-=1;if(p.main<=0){p.main=0;p.inByo=true;p.byoLeft=p.byoTotal;p.movInPer=0;setDanger(pid,false)}else if(p.main<=10){playBeep(1-p.main/10);setDanger(pid,true);pulseT(pid)}else setDanger(pid,false)}
    else{p.byoLeft-=1;if(p.byoLeft<=0){setDanger(pid,false);expire();return}var t2=byoTh();if(p.byoLeft<=t2){playBeep(1-p.byoLeft/t2);setDanger(pid,true);pulseT(pid)}else setDanger(pid,false)}
  }else if(sys==='fischer'){p.main-=1;if(p.main<=0){setDanger(pid,false);expire();return}if(p.main<=10){playBeep(1-p.main/10);setDanger(pid,true);pulseT(pid)}else setDanger(pid,false)}
  else if(sys==='simple'){p.main-=1;if(p.main<=0){setDanger(pid,false);expire();return}var t3=byoTh();if(p.main<=t3){playBeep(1-p.main/t3);setDanger(pid,true);pulseT(pid)}else setDanger(pid,false)}
  updDisplay(pid);
  rPushClock();
}
function pulseT(pid){var el=gel('t'+pid);el.classList.remove('pulse');void el.offsetWidth;el.classList.add('pulse')}
function expire(){clearInterval(gs.iv);gs.phase='expired';updDisplay(gs.active);updHalves();updMVC();showExpired(gs.active);rPushClock()}

function canTap(pid){
  if(!RS||RS.so)return true;
  var r=RS.mr;
  if(r==='host')return true;
  if(r==='black'&&pid===1)return true;
  if(r==='white'&&pid===2)return true;
  return false;
}
function switchTurn(fromPid){
  if(gs.phase==='expired')return;
  if(!canTap(fromPid))return;
  if(gs.phase==='idle'){
    initP();updDisplay(1);updDisplay(2);setDanger(1,false);setDanger(2,false);
    playPop();ripple(fromPid);startP(fromPid===1?2:1);return;
  }
  if(gs.phase==='paused')return;
  if(gs.active!==fromPid)return;
  var p=fromPid===1?gs.p1:gs.p2,sys=cfg.system;
  if(sys==='japanese'&&p.inByo)p.byoLeft=p.byoTotal;
  if(sys==='canadian'&&p.inByo){p.movInPer+=1;if(p.movInPer>=p.movReq){p.movInPer=0;p.byoLeft=p.byoTotal}}
  if(sys==='fischer')p.main+=p.inc;
  if(sys==='simple')p.main=p.movTot;
  gs.moves+=1;setDanger(fromPid,false);playPop();ripple(fromPid);
  startP(fromPid===1?2:1);updMVC();rPushClock();
}
function startP(pid){
  if(cfg.system==='simple'){var np=pid===1?gs.p1:gs.p2;np.main=np.movTot}
  gs.active=pid;gs.phase='running';updHalves();clearInterval(gs.iv);gs.iv=setInterval(tick,1000);
}
function togglePause(){
  if(gs.phase==='idle'||gs.phase==='expired')return;
  if(gs.phase==='running'){gs.phase='paused';clearInterval(gs.iv);gel('btnP').textContent='Resume'}
  else{gs.phase='running';gs.iv=setInterval(tick,1000);gel('btnP').textContent='Pause'}
  updHalves();rPushClock();
}
function resetGame(){
  clearInterval(gs.iv);gs.phase='idle';gs.active=null;initP();
  gel('btnP').textContent='Pause';gel('expov').classList.remove('on');
  setDanger(1,false);setDanger(2,false);
  updDisplay(1);updDisplay(2);updHalves();updTapLbls();updMVC();rPushClock();
}
function showExpired(pid){gel('expwho').textContent=(pid===1?'Black':'White')+' loses on time';gel('expov').classList.add('on')}

function buildTF(sysId){
  var sys=SYS[sysId],con=gel('tfields');con.innerHTML='';

    if(f.t==='mm'){var m=Math.floor(val/60),s=val%60;inp='<div class="tig"><input class="tin" type="number" id="f'+f.id+'m" min="0" max="999" value="'+m+'"><span class="tcol">:</span><input class="tin" type="number" id="f'+f.id+'s" min="0" max="59" value="'+s+'"></div>'}
    else{inp='<div class="tig"><input class="cin" type="number" id="f'+f.id+'" min="1" max="999" value="'+val+'"><span class="tunit">'+(f.unit||'')+'</span></div>'}
    row.innerHTML='<div class="trlhs"><div class="trlbl">'+f.lbl+'</div><div class="trsub">'+f.sub+'</div></div>'+inp;
    con.appendChild(row);

function buildRules(sysId){gel('rtxt').innerHTML=SYS[sysId].rules}
function readTF(){
  var sys=SYS[curSys],out={system:curSys};

    else{out[f.id]=Math.max(1,parseInt(gel('f'+f.id).value)||1)}
  });
  return Object.assign({},DEFS,out);
}

function fmtD(s){if(s>=60&&s%60===0)return Math.floor(s/60)+'m';if(s>=60)return Math.floor(s/60)+'m'+(s%60)+'s';return s+'s'}
function pLabel(p){
  if(p.system==='japanese')return fmtD(p.mainTime)+' + '+p.byoCount+'×'+fmtD(p.byoTime);
  if(p.system==='sudden')return fmtD(p.mainTime)+' SD';
  if(p.system==='canadian')return fmtD(p.mainTime)+' + '+p.movesPerPeriod+'mv/'+fmtD(p.byoTime);
  if(p.system==='fischer')return fmtD(p.mainTime)+' +'+p.increment+'s';
  if(p.system==='simple')return fmtD(p.moveTime)+' / move';
  return '';
}
function savePreset(){

function delPreset(i){presets.splice(i,1);savePresets(presets);renderPresets()}
function loadPreset(i){cfg=Object.assign({},DEFS,presets[i]);saveSettings(cfg);loadSUI();renderPresets();toast('Loaded "'+presets[i].name+'"')}

function mkCode(){var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:6},function(){return c[Math.floor(Math.random()*c.length)]}).join('')}
function encClock(){return{phase:gs.phase,active:gs.active,moves:gs.moves,p1:gs.p1?Object.assign({},gs.p1):null,p2:gs.p2?Object.assign({},gs.p2):null,ts:Date.now()}}

function rPushClock(){
  if(!RS||RS.so||RS.role!=='host'||!FB.ready)return;
  clearTimeout(pushT);
  pushT=setTimeout(function(){
    try{ignNext=true;FB.updateDoc(FB.doc(FB.db,'rooms',RS.rid),{clock:encClock(),settings:Object.assign({},cfg)})}
    catch(e){console.warn('push fail',e)}
  },100);
}

function applyRClock(data){
  if(!data)return;
  if(data.settings&&data.settings.system){cfg=Object.assign({},DEFS,data.settings);saveSettings(cfg);updTapLbls()}
  var c=data.clock;if(!c)return;
  clearInterval(gs.iv);
  gs.phase=c.phase;gs.active=c.active;gs.moves=c.moves||0;
  gs.p1=c.p1?Object.assign({},c.p1):mkP();gs.p2=c.p2?Object.assign({},c.p2):mkP();
  if(gs.phase==='running'){gs.iv=setInterval(tick,1000);gel('btnP').textContent='Pause'}
  else if(gs.phase==='paused'){gel('btnP').textContent='Resume'}
  else if(gs.phase==='expired'){showExpired(gs.active)}
  else{gel('btnP').textContent='Pause'}
  updDisplay(1);updDisplay(2);updHalves();updMVC();
}

}

function doHost(myName){

function doJoin(rid,myName){
  if(!FB.ready){toast('Connecting to Firebase…');return}
  rid=rid.toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(rid.length<4){toast('Enter a valid code');return}
  var myId=getMyId();
  FB.setDoc(FB.doc(FB.db,'rooms',rid,'members',myId),{name:myName,role:'viewer',active:true})
  .then(function(){
    var unR=FB.onSnapshot(FB.doc(FB.db,'rooms',rid),function(snap){
      if(!snap.exists()){toast('Room not found');doLeave();return}
      if(ignNext){ignNext=false;return}
      applyRClock(snap.data());
    });
    var unM=startML(rid);
    RS={rid:rid,myId:myId,myName:myName,mr:'viewer',role:'part',so:false,unR:unR,unM:unM};
    updRBar();renderRIn();toast('Joined room '+rid);
  }).catch(function(e){toast('Could not join room')});
}

// STEP OUT / IN
function doStepOut(){
  if(!RS||RS.so)return;
  if(RS.unR)RS.unR();if(RS.unM)RS.unM();
  clearInterval(gs.iv);
  if(FB.ready)try{FB.updateDoc(FB.doc(FB.db,'rooms',RS.rid,'members',RS.myId),{active:false})}catch(e){}
  RS.so=true;updRBar();renderRIn();toast('Stepped out');
}
function doStepIn(){
  if(!RS||!RS.so)return;
  var rid=RS.rid,myId=RS.myId;
  if(FB.ready)try{FB.updateDoc(FB.doc(FB.db,'rooms',rid,'members',myId),{active:true})}catch(e){}
  var unR=FB.onSnapshot(FB.doc(FB.db,'rooms',rid),function(snap){
    if(!snap.exists()){toast('Room gone');doLeave();return}
    if(ignNext){ignNext=false;return}
    applyRClock(snap.data());renderRIn();
  });
  var unM=startML(rid);
  RS.unR=unR;RS.unM=unM;RS.so=false;
  updRBar();renderRIn();toast('Stepped back in');
}
function toggleSO(){if(RS&&RS.so)doStepIn();else doStepOut()}

  if(!RS)return;

      rows+='<div class="mrow"><span class="mname">'+(m.name||uid)+'</span>'+st+'<div class="rpick">'+rb+'</div></div>';

    if(rows)mHtml='<div style="margin-top:8px"><div class="mlbl">Participants</div>'+rows+'</div>';
  }
  el.innerHTML=
    '<div class="rcoderow"><div class="rcodebig">'+RS.rid+'</div><span class="rpill '+pc+'">'+pn+'</span><button class="rpbtn gy" id="rCpBtn" style="font-size:11px;padding:0 12px;min-height:34px">Copy</button></div>'+
    '<div class="rinfo">'+(isHost?'Your settings active. Share the code.':'Host\'s clock and settings synced.')+'</div>'+
    '<div class="rbtns"><button class="rpbtn gy" id="rSOBtn2">Step Out</button><button class="rpbtn rd" id="rLvBtn2">Leave Room</button></div>'+
    mHtml;
  gel('rCpBtn').addEventListener('click',copyCode);
  gel('rSOBtn2').addEventListener('click',doStepOut);
  gel('rLvBtn2').addEventListener('click',confirmLeave);
  el.querySelectorAll('.rolebtn').forEach(function(b){
    b.addEventListener('click',function(){setRole(b.dataset.uid,b.dataset.role)});
  });
}

// ─────────────────────────────────────────────
// EVENT WIRING
// ─────────────────────────────────────────────
// Clock halves
[['h1',1],['h2',2]].forEach(function(pair){
  var el=gel(pair[0]),pid=pair[1],sup=false;
  el.addEventListener('touchstart',function(e){e.preventDefault();switchTurn(pid)},{passive:false});
  el.addEventListener('touchend',function(){sup=true;setTimeout(function(){sup=false},500)},{passive:true});
  el.addEventListener('click',function(e){if(sup){e.stopImmediatePropagation();return}switchTurn(pid)},true);
});
// Buttons
gel('btnR').addEventListener('click',resetGame);
gel('btnP').addEventListener('click',togglePause);
gel('btnS').addEventListener('click',showSettings);
gel('btnBk').addEventListener('click',showClock);
gel('btnPl').addEventListener('click',applyAndPlay);
gel('btnAP').addEventListener('click',savePreset);
gel('btnER').addEventListener('click',resetGame);
gel('lStk').addEventListener('click',function(){setLayout('stacked')});
gel('lSbs').addEventListener('click',function(){setLayout('side')});
gel('rtogBtn').addEventListener('click',toggleRemote);
gel('rsoBtn').addEventListener('click',toggleSO);
gel('rlvBtn').addEventListener('click',confirmLeave);
gel('cstrig').addEventListener('click',toggleDD);
// Modal
gel('mcan').addEventListener('click',closeModal);
gel('mok').addEventListener('click',confirmModal);
gel('mback').addEventListener('click',function(e){if(e.target===gel('mback'))closeModal()});
gel('minp').addEventListener('keydown',function(e){if(e.key==='Enter')confirmModal();if(e.key==='Escape')closeModal()});
// Global
document.addEventListener('click',function(e){if(ddOpen&&!gel('cswrap').contains(e.target))closeDD()});
document.addEventListener('touchmove',function(e){if(!gel('sp').classList.contains('hidden'))return;e.preventDefault()},{passive:false});
document.addEventListener('keydown',function(e){
  if(!gel('sp').classList.contains('hidden'))return;
  if(gel('mback').classList.contains('on'))return;
  if(e.code==='Space'||e.code==='Enter'){e.preventDefault();if(gs.active!==null)switchTurn(gs.active);else switchTurn(2)}
  if(e.code==='KeyP')togglePause();
  if(e.code==='KeyR')resetGame();
});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
applyLayout(curLayout);
initP();
updDisplay(1);updDisplay(2);
updHalves();updTapLbls();updMVC();updRBar();
</script>
